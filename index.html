<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hewitt's Summer Academy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F46D1B;--orange-dark:#C4540E;--orange-light:#FEE8D6;
  --navy:#0D1B2A;--gold:#F5C518;--gold-light:#FEF9C3;
  --green:#22C55E;--green-light:#DCFCE7;
  --red:#EF4444;--red-light:#FEE2E2;
  --blue:#3B82F6;--blue-light:#EFF6FF;
  --f1-red:#E8002D;--f1-dark:#15151E;--lando:#FF8000;--kimi:#00A0DE;
  --gray-bg:#F4F2EE;--card-bg:#FFFFFF;--text:#0D1B2A;--muted:#6B7280;
  --border:rgba(13,27,42,0.1);--radius:14px;
  --font-d:'Bebas Neue','Impact',sans-serif;--font-b:'DM Sans','Segoe UI',sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--gray-bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
.app{max-width:680px;margin:0 auto;padding-bottom:80px;min-height:100vh;background:var(--gray-bg)}

/* HEADER */
.header{background:var(--navy);padding:24px 20px 0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(244,109,27,0.15) 0%,transparent 70%);pointer-events:none}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.app-title{font-family:var(--font-d);font-size:32px;color:var(--orange);letter-spacing:2px;line-height:.95}
.app-subtitle{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.streak-badge{background:var(--orange);color:white;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0}
.xp-section{padding:0 0 22px}
.level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.level-badge{background:var(--gold);color:var(--navy);font-family:var(--font-d);font-size:20px;padding:3px 12px;border-radius:6px;line-height:1.4;flex-shrink:0}
.level-name{color:white;font-size:15px;font-weight:600}
.xp-label{display:flex;justify-content:space-between;margin-bottom:7px}
.xp-label span{font-size:12px;color:rgba(255,255,255,.5)}
.xp-label strong{color:var(--gold);font-size:13px}
.xp-bar{background:rgba(255,255,255,.1);border-radius:99px;height:10px;overflow:hidden}
.xp-fill{background:linear-gradient(90deg,var(--orange),var(--gold));border-radius:99px;height:100%;transition:width .7s cubic-bezier(.4,0,.2,1);min-width:2px}

/* TABS */
.tabs{display:flex;background:white;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto}
.tab{flex:1;min-width:54px;padding:12px 3px 9px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.4px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;text-transform:uppercase;user-select:none;white-space:nowrap}
.tab:hover{color:var(--orange)}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-icon{font-size:17px;display:block;margin-bottom:2px}

.content{padding:18px 16px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:14px 10px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-num{font-family:var(--font-d);font-size:28px;color:var(--orange);line-height:1;letter-spacing:1px}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.section-title{font-family:var(--font-d);font-size:24px;color:var(--navy);margin-bottom:12px;letter-spacing:1px}

/* CHIPS */
.filter-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;background:white;color:var(--muted);transition:all .15s;text-transform:uppercase;letter-spacing:.3px;user-select:none}
.chip:hover{border-color:var(--orange);color:var(--orange)}
.chip.active{background:var(--navy);color:white;border-color:var(--navy)}

/* ASSIGNMENT CARDS */
.assignment-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.assignment-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.assignment-card.completed{opacity:.72}
.card-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;user-select:none}
.cat-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.card-meta{flex:1;min-width:0}
.card-title{font-weight:700;font-size:14px;line-height:1.3;margin-bottom:2px}
.card-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.card-xp{background:var(--orange-light);color:var(--orange-dark);font-size:12px;font-weight:800;padding:5px 12px;border-radius:99px;flex-shrink:0;white-space:nowrap}
.card-xp.done{background:var(--green-light);color:#15803D}
.chevron{font-size:13px;color:var(--muted);margin-left:2px;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.card-body{border-top:1px solid var(--border);padding:14px;display:none;animation:fadeIn .2s ease}
.card-body.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.card-question{font-size:14px;line-height:1.65;margin-bottom:14px;font-weight:500}
.card-options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.option-btn{background:var(--gray-bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;font-family:var(--font-b);cursor:pointer;text-align:left;transition:all .15s;font-weight:500;color:var(--text)}
.option-btn:hover:not(:disabled){border-color:var(--orange);background:var(--orange-light);color:var(--orange-dark)}
.option-btn.correct{background:var(--green-light);border-color:var(--green);color:#15803D;font-weight:700}
.option-btn.wrong{background:var(--red-light);border-color:var(--red);color:#B91C1C}
.option-btn:disabled{cursor:not-allowed}
.result-msg{font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:10px;font-weight:600;line-height:1.5}
.result-msg.win{background:var(--green-light);color:#15803D;border:1px solid var(--green)}
.result-msg.lose{background:var(--red-light);color:#B91C1C;border:1px solid var(--red)}
.done-stamp{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#15803D;background:var(--green-light);border:1px solid var(--green);border-radius:10px;padding:12px 14px;line-height:1.5}

/* TASK CARDS */
.task-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:opacity .2s}
.task-card.done-task{opacity:.6}
.task-icon{font-size:28px;flex-shrink:0}
.task-info{flex:1;min-width:0}
.task-name{font-weight:700;font-size:14px}
.task-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.task-xp-badge{font-size:11px;color:var(--orange-dark);font-weight:800;margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.task-check{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--orange);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0;font-family:var(--font-b)}
.task-check:hover{background:var(--orange-light)}
.task-check.done{background:var(--orange);border-color:var(--orange);color:white}

/* SPORTS */
.sports-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:16px;box-shadow:var(--shadow)}
.sports-icon{font-size:32px;flex-shrink:0;margin-top:2px}
.sports-name{font-weight:700;font-size:15px;margin-bottom:2px}
.sports-stat{font-family:var(--font-d);font-size:30px;color:var(--orange);line-height:1.1;letter-spacing:1px}
.sports-lbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.sports-note{font-size:13px;color:var(--text);line-height:1.55}

/* PROFILE */
.profile-hero{background:var(--navy);border-radius:var(--radius);padding:28px 24px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;bottom:-30px;right:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(245,197,24,.12) 0%,transparent 70%);pointer-events:none}
.avatar{width:84px;height:84px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 14px;border:3px solid var(--gold);box-shadow:0 0 0 6px rgba(245,197,24,.15)}
.profile-name{font-family:var(--font-d);font-size:28px;color:white;letter-spacing:1px}
.profile-title{font-size:13px;color:var(--gold);margin-top:4px;font-weight:600}
.profile-stats{display:flex;justify-content:center;gap:16px;margin-top:16px;flex-wrap:wrap}
.profile-stat{color:rgba(255,255,255,.7);font-size:12px;text-align:center}
.profile-stat strong{display:block;font-family:var(--font-d);font-size:20px;color:white;letter-spacing:.5px;line-height:1.1}
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
.badge-item{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:12px 6px;text-align:center;box-shadow:var(--shadow);transition:transform .15s}
.badge-item:hover{transform:translateY(-2px)}
.badge-emoji{font-size:24px}
.badge-name{font-size:9px;color:var(--muted);margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-item.locked{opacity:.3;filter:grayscale(1)}
.badge-item.earned{border-color:var(--gold);background:var(--gold-light)}
.category-progress{display:flex;flex-direction:column;gap:10px}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-emoji{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.prog-label{font-size:11px;font-weight:700;min-width:75px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
.prog-bar-bg{flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden}
.prog-bar-fill{border-radius:99px;height:100%;background:var(--orange);transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-count{font-size:12px;color:var(--muted);min-width:28px;text-align:right;font-weight:700}
.reset-box{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-top:18px}
.reset-box h3{font-size:14px;font-weight:700;margin-bottom:6px}
.reset-box p{font-size:12px;color:var(--muted);margin-bottom:12px}
.reset-btn{background:var(--red-light);border:1px solid #FCA5A5;color:#B91C1C;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font-b);transition:background .15s}
.reset-btn:hover{background:#FEE2E2}

/* ====== CALENDAR ====== */
.cal-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month-title{font-family:var(--font-d);font-size:26px;color:var(--navy);letter-spacing:1px}
.cal-nav-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.cal-nav-btn:hover{background:var(--orange-light)}
.cal-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-dow{text-align:center;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:5px 0}
.cal-dow.wknd{color:var(--orange)}

.cal-day{background:var(--card-bg);border-radius:9px;border:1px solid var(--border);min-height:62px;padding:5px 4px 4px;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden}
.cal-day:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cal-day.out{background:rgba(255,255,255,.3);border:1px dashed rgba(13,27,42,.06);cursor:default}
.cal-day.out .cal-dn{color:rgba(13,27,42,.2)}
.cal-day.wknd-day{background:#FAFAF8}
.cal-day.logged{background:var(--green-light);border-color:var(--green)}
.cal-day.logged .cal-dn{color:#15803D}

.cal-day.bday{background:linear-gradient(135deg,#FFF7ED 0%,#FEF9C3 60%,#FFF7ED 100%);border:2px solid var(--gold);box-shadow:0 0 0 3px rgba(245,197,24,.2);animation:bdayPulse 2.5s ease-in-out infinite}
@keyframes bdayPulse{0%,100%{box-shadow:0 0 0 3px rgba(245,197,24,.2)}50%{box-shadow:0 0 0 6px rgba(245,197,24,.35)}}
.cal-day.bday .cal-dn{color:var(--orange);font-size:13px}

.cal-day.f1r{background:var(--f1-dark);border-color:var(--f1-red)}
.cal-day.f1r .cal-dn{color:var(--f1-red)}
.cal-day.f1r.logged{background:#1a0a0e;border-color:var(--f1-red)}
.cal-day.f1w{background:#1a1a2e;border-color:rgba(232,0,45,.35)}
.cal-day.f1w .cal-dn{color:rgba(255,255,255,.75)}

.cal-dn{font-size:11px;font-weight:800;line-height:1;margin-bottom:3px;color:var(--text)}
.cal-events{display:flex;flex-direction:column;gap:2px}
.cc{font-size:7px;font-weight:800;padding:1px 3px;border-radius:3px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
.cc-bday{background:var(--gold);color:#78350F}
.cc-f1r{background:var(--f1-red);color:white}
.cc-f1w{background:#2244AA;color:white}
.cc-hol{background:var(--red-light);color:#B91C1C;border:1px solid rgba(220,38,38,.2)}
.cc-sm{background:var(--blue-light);color:#1D4ED8;border:1px solid rgba(59,130,246,.2)}
.cal-check-dot{position:absolute;top:3px;right:3px;width:13px;height:13px;border-radius:50%;background:var(--green);color:white;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:800}

.cal-legend{display:flex;flex-wrap:wrap;gap:6px 12px;padding:8px 0 12px}
.cal-li{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--muted)}
.cal-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.cal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.cal-stat{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:11px 8px;text-align:center}
.cs-num{font-family:var(--font-d);font-size:24px;color:var(--orange);line-height:1}
.cs-lbl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}

/* DAY MODAL */
.overlay{position:fixed;inset:0;background:rgba(13,27,42,.5);z-index:500;display:flex;align-items:flex-end;animation:oIn .2s ease}
@keyframes oIn{from{opacity:0}to{opacity:1}}
.day-modal{background:var(--card-bg);width:100%;max-width:680px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px;max-height:82vh;overflow-y:auto;animation:sUp .25s cubic-bezier(.34,1.4,.64,1)}
@keyframes sUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.modal-title{font-family:var(--font-d);font-size:26px;color:var(--navy);letter-spacing:1px;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.modal-sl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;margin-top:12px}
.modal-note{width:100%;min-height:78px;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font-b);font-size:14px;color:var(--text);background:var(--gray-bg);resize:none;outline:none;transition:border-color .15s;line-height:1.5}
.modal-note:focus{border-color:var(--orange)}
.modal-cb{width:100%;padding:13px;border-radius:10px;border:none;font-family:var(--font-d);font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:12px}
.modal-cb.unc{background:var(--orange);color:white}
.modal-cb.chk{background:var(--green-light);color:#15803D;border:2px solid var(--green)}
.modal-cl{width:100%;padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;font-family:var(--font-b);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;color:var(--muted)}

.f1-box{background:var(--f1-dark);border-radius:10px;padding:13px 15px;margin-bottom:10px;border:1px solid rgba(232,0,45,.3)}
.f1-box-title{font-family:var(--font-d);font-size:20px;color:var(--f1-red);letter-spacing:1px;margin-bottom:3px}
.f1-box-detail{font-size:12px;color:rgba(255,255,255,.55);line-height:1.5}
.f1-drivers{display:flex;gap:8px;margin-top:9px}
.f1-dc{flex:1;border-radius:8px;padding:8px 10px}
.f1-dc .dnum{font-family:var(--font-d);font-size:22px;line-height:1}
.f1-dc .dname{font-size:11px;font-weight:700;margin-top:1px}

.bday-box{background:linear-gradient(135deg,#FFF7ED,#FEF9C3);border:2px solid var(--gold);border-radius:12px;padding:16px;margin-bottom:12px;text-align:center}
.bday-box-cake{font-size:40px;line-height:1;margin-bottom:8px}
.bday-box-title{font-family:var(--font-d);font-size:26px;color:var(--orange);letter-spacing:1px}
.bday-box-sub{font-size:13px;color:#92400E;margin-top:5px;line-height:1.5}

/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--navy);color:white;padding:13px 24px;border-radius:12px;font-weight:700;font-size:18px;font-family:var(--font-d);letter-spacing:1.5px;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap;border:2px solid var(--orange)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:480px){.stat-num{font-size:22px}.app-title{font-size:30px}.cal-day{min-height:52px}}

/* ===== REWARD SYSTEM ===== */
.reward-hero{background:linear-gradient(135deg,var(--navy) 0%,#0a2a18 100%);border-radius:var(--radius);padding:22px 20px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.reward-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(34,197,94,.15) 0%,transparent 70%);pointer-events:none}
.reward-balance{font-family:var(--font-d);font-size:52px;color:var(--green);letter-spacing:2px;line-height:1;position:relative}
.reward-balance-lbl{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;position:relative}
.reward-goal{font-size:13px;color:rgba(255,255,255,.7);margin-top:10px;font-weight:600;position:relative}
.day-goal-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.day-goal-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.day-goal-row:last-child{margin-bottom:0}
.day-goal-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;transition:background .3s}
.day-goal-label{font-size:13px;font-weight:600;flex:1}
.day-goal-status{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.3px}

   fact:"Michelangelo painted the Sistine Chapel ceiling from 1508 to 1512, mostly lying on his back. The most famous section shows God reaching out to touch Adam's finger."},
  {id:'s2_ar02',cat:'art',icon:'&#127912;',bg:'#ECFDF5',title:'Pablo Picasso',sub:'Modern Art',xp:55,
   q:"Pablo Picasso co-founded which major art movement that broke objects into geometric shapes?",
   opts:['Surrealism','Impressionism','Cubism','Expressionism'],answer:'Cubism',
   fact:'Cubism showed multiple perspectives of an object at the same time. Picasso and Georges Braque developed it around 1907. It was one of the most revolutionary changes in art history.'},
  {id:'s2_po01',cat:'poetry',icon:'&#128220;',bg:'#FEF9C3',title:"If— by Kipling",sub:'Rudyard Kipling',xp:70,
   q:"Kipling's poem If is written as advice from a father to his son. What does it say you'll be if you meet certain challenges?",
   opts:['A hero','A king','A Man','A legend'],answer:'A Man',
   fact:"Kipling wrote: If you can meet Triumph and Disaster and treat those two impostors just the same, you'll be a Man my son. Written in 1895, one of the most beloved poems ever written."},
  {id:'s2_po02',cat:'poetry',icon:'&#128220;',bg:'#FEF9C3',title:'Casey at the Bat',sub:'Ernest Thayer',xp:65,
   q:"In the famous baseball poem Casey at the Bat, what happens when Casey steps up to hit?",
   opts:['He hits a home run','He walks','He strikes out','He gets a base hit'],answer:'He strikes out',
   fact:'Published in 1888, the poem ends with "mighty Casey has struck out." It is one of the most famous sports poems ever written and proves that even the best hitter can fail when the pressure is highest.'},
  {id:'s2_ba01',cat:'basketball',icon:'&#127936;',bg:'#FEE8D6',title:'Kobe Bryant',sub:'NBA Legends',xp:65,
   q:"Kobe Bryant spent his entire NBA career with which team?",
   opts:['Chicago Bulls','Boston Celtics','Los Angeles Lakers','Miami Heat'],answer:'Los Angeles Lakers',
   fact:'Kobe played all 20 seasons with the Lakers. He won 5 championships, scored 81 points in a single game in 2006, and wore both #8 and #24. The Lakers retired both numbers.'},
  {id:'s2_ba02',cat:'basketball',icon:'&#127936;',bg:'#FEE8D6',title:'NBA Shot Clock',sub:'Basketball Rules',xp:50,
   q:'The NBA shot clock requires a team to attempt a shot within how many seconds?',
   opts:['20','24','30','35'],answer:'24',
   fact:'The 24-second shot clock was introduced in 1954 by NBA owner Danny Biasone. Before it, teams would stall with the ball. One game ended 19-18. The shot clock saved the NBA.'},
  {id:'s2_ba03',cat:'basketball',icon:'&#127936;',bg:'#FEE8D6',title:'The Finals MVP',sub:'NBA History',xp:55,
   q:'Who is the only player to win NBA Finals MVP with three different teams?',
   opts:['LeBron James',"Shaquille O'Neal",'Kareem Abdul-Jabbar','Magic Johnson'],answer:'LeBron James',
   fact:'LeBron won Finals MVP with the Cavaliers (2016), Heat (2012, 2013), and Lakers (2020). His 2016 title with Cleveland, coming back from 3-1 down, is considered one of the greatest sports comebacks ever.'},
  {id:'s2_ho01',cat:'hockey',icon:'&#127944;',bg:'#E0F2FE',title:'Gordie Howe',sub:'NHL Legends',xp:65,
   q:"Gordie Howe's nickname was Mr. Hockey. How many seasons did he play in professional hockey?",
   opts:['18','22','26','30'],answer:'26',
   fact:'Gordie Howe played 26 professional seasons across the NHL and WHA. He once played on the same line as his two sons. He scored at least one goal in five different decades — one of the most remarkable athletic careers ever.'},
  {id:'s2_ho02',cat:'hockey',icon:'&#127944;',bg:'#E0F2FE',title:'Penalty Shot',sub:'Hockey Rules',xp:50,
   q:'In hockey, a penalty shot is awarded when a player is pulled down on a clear breakaway. How many players are on the ice during a penalty shot?',
   opts:['All 12','Just the shooter and goalie','The two teams plus refs','3 on each side'],answer:'Just the shooter and goalie',
   fact:"A penalty shot is one of the most dramatic moments in hockey. The player skates in alone against the goalie with no interference. It is hockey's version of a penalty kick in soccer."},
  {id:'s2_f101',cat:'f1',icon:'&#127950;',bg:'#1a1a2e',title:'The Pit Stop',sub:'F1 Strategy',xp:60,
   q:"In F1 racing, the world record for the fastest pit stop is approximately how long?",
   opts:['1.8 seconds','2.5 seconds','3.2 seconds','4.0 seconds'],answer:'1.8 seconds',
   fact:'Red Bull Racing set the all-time record at approximately 1.80 seconds in 2023. A pit crew has up to 20 mechanics working simultaneously. The tires, jacks, and fuel nozzle all operate in perfect coordination.'},
  {id:'s2_f102',cat:'f1',icon:'&#127950;',bg:'#1a1a2e',title:'F1 Champions',sub:'F1 History',xp:60,
   q:"Which F1 driver holds the record for the most World Championship titles?",
   opts:['Ayrton Senna','Michael Schumacher','Lewis Hamilton','Max Verstappen'],answer:'Lewis Hamilton',
   fact:"Lewis Hamilton won 7 World Championships, tying Schumacher's record. He drove for McLaren then Mercedes. Widely considered one of the greatest F1 drivers ever."},

  {id:'s3_m01',cat:'math',icon:'&#10135;',bg:'#F0FDF4',title:'Averaging Stats',sub:'Sports Math',xp:55,
   q:'A basketball player scores 24, 31, 18, and 27 points over 4 games. What is their average points per game?',
   opts:['24','25','26','27'],answer:'25',
   fact:'Add all four: 24+31+18+27=100. Divide by 4 games: 100/4=25 points per game. Averages are one of the most used stats in all of sports.'},
  {id:'s3_m02',cat:'math',icon:'&#10135;',bg:'#F0FDF4',title:'Percentages',sub:'Math',xp:55,
   q:'A team makes 15 out of 20 three-point attempts. What percentage did they make?',
   opts:['65%','70%','75%','80%'],answer:'75%',
   fact:'15 divided by 20 equals 0.75, or 75%. In the NBA, shooting 40% from three is considered excellent. Steph Curry careers at 43%.'},
  {id:'s3_h01',cat:'history',icon:'&#128214;',bg:'#FEF3C7',title:'The Constitution',sub:'American History',xp:60,
   q:'How many amendments does the US Constitution currently have?',
   opts:['10','15','27','32'],answer:'27',
   fact:'The first 10 amendments are called the Bill of Rights, added in 1791. The most recent, the 27th Amendment, was ratified in 1992. It deals with Congressional pay raises.'},
  {id:'s3_h02',cat:'history',icon:'&#128214;',bg:'#FEF3C7',title:'The Great Depression',sub:'American History',xp:60,
   q:'The Great Depression began in 1929 when what event triggered a financial collapse?',
   opts:['A major flood','The stock market crash','A world war','A drought'],answer:'The stock market crash',
   fact:'October 29, 1929 — known as Black Tuesday — the stock market crashed. Millions lost jobs and savings. President FDR created the New Deal to help rebuild the economy.'},
  {id:'s3_b01',cat:'bible',icon:'&#9997;',bg:'#FFF7ED',title:'Joseph and His Brothers',sub:'Genesis 37-50',xp:65,
   q:'Joseph was sold into slavery by his brothers. What did God ultimately use that experience for?',
   opts:['To punish his brothers','To make Joseph a shepherd','To save Egypt and his family from famine','To give Joseph a palace'],answer:'To save Egypt and his family from famine',
   fact:'Genesis 50:20 — Joseph told his brothers: You intended to harm me, but God intended it for good. His suffering led him to become a ruler in Egypt who saved millions from starvation.'},
  {id:'s3_b02',cat:'bible',icon:'&#9997;',bg:'#FFF7ED',title:'The Beatitudes',sub:'Matthew 5',xp:65,
   q:'The Sermon on the Mount begins with the Beatitudes. Which of these is one of them?',
   opts:['"Blessed are the strong"','"Blessed are the rich"','"Blessed are the meek"','"Blessed are the clever"'],answer:'"Blessed are the meek"',
   fact:'Matthew 5:5 — Blessed are the meek, for they will inherit the earth. Jesus flips worldly values upside down. The humble, merciful, and pure in heart are honored above the powerful.'},
  {id:'s3_b03',cat:'bible',icon:'&#9997;',bg:'#FFF7ED',title:'Elijah and the Prophets',sub:'1 Kings 18',xp:60,
   q:'Elijah challenged 450 prophets of Baal to a contest. What was the test?',
   opts:['Who could run fastest','Whose prayer would light a sacrifice with fire from heaven','Who could build the biggest altar','Who could fast the longest'],answer:'Whose prayer would light a sacrifice with fire from heaven',
   fact:'1 Kings 18 — After the prophets of Baal failed all day, Elijah prayed once and fire came down from God and consumed everything including the water-soaked altar. It proved who the real God was.'},
  {id:'s3_mu01',cat:'music',icon:'&#127928;',bg:'#EDE9FE',title:'Stevie Wonder',sub:'Music History',xp:55,
   q:'Stevie Wonder was blind from infancy and became one of the greatest musicians ever. How many Grammy Awards has he won?',
   opts:['10','15','25','32'],answer:'25',
   fact:'25 Grammys and a Grammy Lifetime Achievement Award. He was signed to Motown at age 11. Songs like Superstition, Sir Duke, and Innervisions are considered masterpieces.'},
  {id:'s3_mu02',cat:'music',icon:'&#127928;',bg:'#EDE9FE',title:'Woodstock 1969',sub:'Music History',xp:55,
   q:'Woodstock in 1969 was a landmark music festival. Approximately how many people attended?',
   opts:['50,000','100,000','400,000','1,000,000'],answer:'400,000',
   fact:'About 400,000 people showed up in Bethel, New York over three days. Performers included Jimi Hendrix, Janis Joplin, The Who, Jefferson Airplane, and Crosby, Stills, Nash and Young.'},
  {id:'s3_ar01',cat:'art',icon:'&#127912;',bg:'#ECFDF5',title:'Jackson Pollock',sub:'Abstract Art',xp:55,
   q:'Jackson Pollock was famous for his drip painting technique. What art movement was he part of?',
   opts:['Impressionism','Pop Art','Abstract Expressionism','Surrealism'],answer:'Abstract Expressionism',
   fact:'Pollock would lay a canvas on the floor and drip, fling, and pour paint across it. Critics laughed at first. Today his paintings sell for over $100 million. His studio floor is now itself a museum piece.'},
  {id:'s3_ar02',cat:'art',icon:'&#127912;',bg:'#ECFDF5',title:'Frida Kahlo',sub:'Mexican Art',xp:60,
   q:'Frida Kahlo is one of the most recognized artists in history. What country was she from?',
   opts:['Spain','Argentina','Mexico','Brazil'],answer:'Mexico',
   fact:'Kahlo survived a devastating bus accident at 18 that left her in pain for life. She painted mostly self-portraits exploring her identity and suffering. She said: I paint myself because I am so often alone.'},
  {id:'s3_po01',cat:'poetry',icon:'&#128220;',bg:'#FEF9C3',title:'Nothing Gold Can Stay',sub:'Robert Frost',xp:70,
   q:"In Frost's poem Nothing Gold Can Stay — the line So Eden sank to grief — refers to what biblical story?",
   opts:["Noah's Flood",'The Tower of Babel','Adam and Eve losing the Garden of Eden','The Exodus from Egypt'],answer:'Adam and Eve losing the Garden of Eden',
   fact:'The poem is about how nothing beautiful lasts. The Garden of Eden represents the most perfect thing that was ever lost. The last line — So dawn goes down to day — means even the most beautiful moment becomes ordinary.'},
  {id:'s3_po02',cat:'poetry',icon:'&#128220;',bg:'#FEF9C3',title:'Invictus',sub:'William Ernest Henley',xp:70,
   q:'Invictus ends with two of the most famous lines in poetry. What are they?',
   opts:['"I am the master of my fate, I am the captain of my soul"','"Do not go gentle into that good night"','"Two roads diverged in a wood"','"I think therefore I am"'],answer:'"I am the master of my fate, I am the captain of my soul"',
   fact:'Written in 1875 by Henley who had his leg amputated but refused to let it break him. Nelson Mandela recited it during his 27 years in prison. It is one of the most powerful declarations of human will ever written.'},
  {id:'s3_ba01',cat:'basketball',icon:'&#127936;',bg:'#FEE8D6',title:'The Triangle Offense',sub:'NBA Strategy',xp:55,
   q:'Phil Jackson coached the Chicago Bulls and LA Lakers to 11 championships using what famous offensive system?',
   opts:['The Princeton Offense','The Flex Offense','The Triangle Offense','The Motion Offense'],answer:'The Triangle Offense',
   fact:'The Triangle was developed by Tex Winter. It creates equal spacing and requires every player to read the defense and make decisions. Jordan, Pippen, Shaq, and Kobe all ran it. Jackson is the winningest coach in NBA history.'},
  {id:'s3_ba02',cat:'basketball',icon:'&#127936;',bg:'#FEE8D6',title:'Kareem Abdul-Jabbar',sub:'NBA Legends',xp:60,
   q:"Kareem Abdul-Jabbar held the NBA scoring record for 38 years. What was his signature shot?",
   opts:['The Fade Away','The Sky Hook','The Bank Shot','The Drop Step'],answer:'The Sky Hook',
   fact:"The skyhook was nearly unblockable — Kareem released it so high with one hand. At 7ft 2in he won 6 championships and 6 MVPs. LeBron broke his scoring record in 2023."},
  {id:"s3_ho01",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"Miracle on Ice",sub:"Hockey History",xp:70,
   q:"The 1980 Miracle on Ice saw the US Olympic hockey team defeat which powerful opponent?",
   opts:['Canada','Sweden','Czechoslovakia','Soviet Union'],answer:'Soviet Union',
   fact:'February 22, 1980. The Soviet Union had dominated international hockey for decades. The US team was a group of college kids. They won 4-3 in one of the greatest upsets in sports history.'},
  {id:'s3_ho02',cat:'hockey',icon:'&#127944;',bg:'#E0F2FE',title:'Bobby Orr',sub:'NHL Legends',xp:65,
   q:'Bobby Orr revolutionized the defenseman position. Which team did he play for during his most famous years?',
   opts:['Montreal Canadiens','Toronto Maple Leafs','Boston Bruins','New York Rangers'],answer:'Boston Bruins',
   fact:'Orr won 8 consecutive Norris Trophies as best defenseman. He is the only defenseman ever to win the NHL scoring title — twice. His flying goal photo in the 1970 Stanley Cup Finals is one of the most iconic sports images ever.'},
  {id:'s3_f101',cat:'f1',icon:'&#127950;',bg:'#1a1a2e',title:'Ayrton Senna',sub:'F1 Legends',xp:65,
   q:'Ayrton Senna is considered one of the greatest F1 drivers ever. How many World Championships did he win?',
   opts:['2','3','4','5'],answer:'3',
   fact:'1988, 1990, 1991. Senna was known for his ability in the rain and his raw speed. He died in a crash at Imola in 1994. His home country of Brazil stopped for three days of mourning. Lando Norris has spoken about being inspired by Senna.'},
  {id:'s3_f102',cat:'f1',icon:'&#127950;',bg:'#1a1a2e',title:'DRS',sub:'F1 Rules',xp:50,
   q:'In F1, what does DRS stand for and what does it do?',
   opts:['Drag Reduction System — reduces aerodynamic drag to increase speed on straights','Double Racing Speed — allows cars to go twice as fast','Driver Response System — helps the driver steer','Downforce Reduction Sensor — measures grip'],answer:'Drag Reduction System — reduces aerodynamic drag to increase speed on straights',
   fact:'DRS opens a flap in the rear wing, reducing drag by up to 10-15 mph on straights. Drivers can only use it within 1 second of the car ahead in designated zones. It was introduced in 2011 to help create more overtaking.'}

  {id:'s4_m01',cat:'math',icon:'&#10135;',bg:'#F0FDF4',title:'F1 Lap Record',sub:'Racing Math',xp:55,
   q:'Lando Norris set a lap time of 1:11.097 at a circuit. A rival set 1:11.402. How many milliseconds faster was Lando?',
   opts:['205ms','305ms','405ms','505ms'],answer:'305ms',
   fact:'1:11.402 minus 1:11.097 = 0.305 seconds = 305 milliseconds. In F1, hundredths of a second decide qualifying positions. Pole position can be won or lost by less than one tenth of a second.'},
  {id:'s4_m02',cat:'math',icon:'&#10135;',bg:'#F0FDF4',title:'Salary Cap Math',sub:'Sports Business',xp:55,
   q:'An NBA team has a $120 million salary cap. Their five starters earn $22M, $18M, $16M, $14M, and $12M. How much is left for the rest of the roster?',
   opts:['$28M','$38M','$48M','$58M'],answer:'$38M',
   fact:'22+18+16+14+12 = $82M. $120M - $82M = $38M left. Teams use every dollar strategically. Going over the cap costs owners a luxury tax — sometimes more than $1 for every $1 over.'},
  {id:'s4_h01',cat:'history',icon:'&#128214;',bg:'#FEF3C7',title:'The Cold War',sub:'World History',xp:60,
   q:'The Cold War was a decades-long tension between the United States and which other country?',
   opts:['Germany','China','The Soviet Union','Japan'],answer:'The Soviet Union',
   fact:'1947 to 1991. No direct military combat but a constant competition for global influence, nuclear weapons, and space. The Berlin Wall, the Space Race, and the Cuban Missile Crisis were all part of it.'},
  {id:'s4_h02',cat:'history',icon:'&#128214;',bg:'#FEF3C7',title:'The Space Race',sub:'American History',xp:60,
   q:'The United States beat the Soviet Union to the moon in 1969. Which mission accomplished the first moon landing?',
   opts:['Apollo 11','Apollo 13','Gemini 7','Mercury Atlas 6'],answer:'Apollo 11',
   fact:'Apollo 11. Neil Armstrong and Buzz Aldrin landed on July 20, 1969 while Michael Collins orbited above. Armstrong stepped out first. Buzz Aldrin described the surface as "magnificent desolation."'},
  {id:'s4_b01',cat:'bible',icon:'&#9997;',bg:'#FFF7ED',title:'Daniel in the Lions Den',sub:'Daniel 6',xp:65,
   q:'Daniel was thrown into the lions den because he refused to stop doing what?',
   opts:['Eating meat','Praying to God','Wearing his robe','Working on the Sabbath'],answer:'Praying to God',
   fact:"Daniel 6 — King Darius made prayer illegal. Daniel kept praying toward Jerusalem every day. God shut the lions' mouths. Daniel came out without a scratch."},
  {id:'s4_b02',cat:'bible',icon:'&#9997;',bg:'#FFF7ED',title:'The Sermon on the Mount',sub:'Matthew 5-7',xp:65,
   q:'In the Sermon on the Mount, Jesus says you are the _____ of the world — meaning you should shine light everywhere.',
   opts:['Hope','Salt','Light','Rock'],answer:'Light',
   fact:'Matthew 5:14 — You are the light of the world. A city on a hill cannot be hidden. Jesus calls his followers to live in a way that makes goodness visible to everyone around them.'},
  {id:'s4_b03',cat:'bible',icon:'&#9997;',bg:'#FFF7ED',title:'Faith Like a Mustard Seed',sub:'Matthew 17',xp:60,
   q:'Jesus says if you have faith as small as a mustard seed you can do what?',
   opts:['Walk on water','Move mountains','Heal the sick','See God'],answer:'Move mountains',
   fact:'Matthew 17:20 — The mustard seed was the smallest seed known in that culture. Jesus is saying that even the tiniest genuine faith is more powerful than people imagine. It is about trust, not size.'},
  {id:'s4_mu01',cat:'music',icon:'&#127928;',bg:'#EDE9FE',title:'Prince',sub:'Music History',xp:60,
   q:'Prince was one of the most versatile musicians ever. Which instrument was he NOT known for playing?',
   opts:['Guitar','Piano','Drums','Cello'],answer:'Cello',
   fact:'Prince could play over 20 instruments and played almost every instrument on his debut album at age 19. His guitar solo on "While My Guitar Gently Weeps" at the 2004 Rock and Roll Hall of Fame is considered one of the greatest performances ever.'},
  {id:'s4_mu02',cat:'music',icon:'&#127928;',bg:'#EDE9FE',title:'Ray Charles',sub:'Music Biography',xp:55,
   q:'Ray Charles was blind from age 7 and became a pioneer of what genre of music?',
   opts:['Classical','Jazz only','Soul music','Country only'],answer:'Soul music',
   fact:'Ray Charles fused gospel, blues, jazz, and R&B to create soul music. He was also one of the first artists to successfully cross into country music. Songs like Georgia on My Mind and Hit the Road Jack are standards.'},
  {id:'s4_ar01',cat:'art',icon:'&#127912;',bg:'#ECFDF5',title:'Salvador Dali',sub:'Surrealist Art',xp:55,
   q:'Salvador Dali was a leader of Surrealism. His most famous painting shows melting versions of what object?',
   opts:['Clocks','Apples','Telephones','Eggs'],answer:'Clocks',
   fact:'The Persistence of Memory (1931) shows clocks melting over a dreamlike landscape. Dali was inspired by a piece of melting Camembert cheese. Surrealism explored the unconscious mind and dreams as subjects for art.'},
  {id:'s4_ar02',cat:'art',icon:'&#127912;',bg:'#ECFDF5',title:'Street Art',sub:'Modern Art',xp:50,
   q:"Banksy is the world's most famous street artist. What makes his identity unusual?",
   opts:['He is a robot','He is completely anonymous — nobody knows who he is','He is a group of 10 artists','He only paints at night'],answer:'He is completely anonymous — nobody knows who he is',
   fact:'Despite being worth hundreds of millions of dollars and having work in major museums, nobody officially knows who Banksy is. His pieces appear overnight on walls around the world. He once shredded his own painting seconds after it sold at auction for $1.4 million.'},
  {id:'s4_po01',cat:'poetry',icon:'&#128220;',bg:'#FEF9C3',title:'Do Not Go Gentle',sub:'Dylan Thomas',xp:70,
   q:'Dylan Thomas wrote "Do not go gentle into that good night" for his dying father. What does "rage against the dying of the light" mean?',
   opts:["Be angry at candles","Fight against death and not give up easily","Complain about the weather","Stay up late"],answer:"Fight against death and not give up easily",
   fact:"Written in 1947. The light is life itself. Thomas begs his father to fight and not accept death passively. One of the most emotionally powerful poems ever written. Many athletes have used it as motivation."},
  {id:"s4_po02",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"This Is Just To Say",sub:"William Carlos Williams",xp:60,
   q:"Williams wrote a short poem called This Is Just To Say — a note about eating what from the icebox?",
   opts:['Grapes','Cookies','Plums','Apples'],answer:'Plums',
   fact:'He ate plums from the icebox that were probably being saved for breakfast and left a note apologizing but saying they were delicious and he is not really sorry. It is a poem about everyday honesty. Short, simple, and somehow unforgettable.'},
  {id:'s4_ba01',cat:'basketball',icon:'&#127936;',bg:'#FEE8D6',title:'Russell Westbrook',sub:'Triple Double King',xp:55,
   q:'Russell Westbrook holds the NBA record for most career triple-doubles. What is a triple-double?',
   opts:['Scoring 30+ points three games in a row','Reaching double figures in three stat categories in one game','Making 10+ shots in three quarters','Having 10+ points in each quarter'],answer:'Reaching double figures in three stat categories in one game',
   fact:'Points, rebounds, and assists are the most common. Westbrook averaged a triple-double for three straight seasons. Oscar Robertson did it first for an entire season in 1961-62. It is considered one of the hardest achievements in basketball.'},
  {id:'s4_ba02',cat:'basketball',icon:'&#127936;',bg:'#FEE8D6',title:'The 2016 Finals',sub:'NBA History',xp:65,
   q:'The 2016 NBA Finals is considered one of the greatest comebacks ever. The Cleveland Cavaliers came back from what deficit?',
   opts:['2-1','3-1','3-2','2-0'],answer:'3-1',
   fact:'No team had ever come back from 3-1 down in the Finals. LeBron James, Kyrie Irving, and the Cavaliers won Games 5, 6, and 7 to bring Cleveland its first championship in 52 years. LeBron blocked a layup in the final minute of Game 7 that sealed it.'},
  {id:'s4_ho01',cat:'hockey',icon:'&#127944;',bg:'#E0F2FE',title:'Mario Lemieux',sub:'NHL Legends',xp:65,
   q:'Mario Lemieux battled cancer and back problems but still retired as one of the greatest scorers ever. What was his nickname?',
   opts:['The Magnificent One','Super Mario','Le Magnifique','The Pensburgh Penguin'],answer:'Le Magnifique',
   fact:'French for The Magnificent One. Lemieux played for the Pittsburgh Penguins his entire career, won two Stanley Cups, and later bought the franchise to save it from relocation. He is the only person to have both played for and owned an NHL team.'},
  {id:'s4_ho02',cat:'hockey',icon:'&#127944;',bg:'#E0F2FE',title:'Hockey Rules',sub:'NHL Rules',xp:50,
   q:'In hockey, how many players from each team are on the ice at one time during regular play?',
   opts:['4','5','6','7'],answer:'6',
   fact:'5 skaters plus 1 goaltender per team. When a player gets a penalty and goes to the penalty box, their team plays shorthanded — 5 on 4 or even 5 on 3. The team with more players has a power play opportunity.'},
  {id:"s4_f101",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Monaco Grand Prix",sub:"F1 History",xp:60,
   q:"The Monaco Grand Prix is the most prestigious race in F1. What makes it so difficult to drive?",
   opts:["It rains every year","The track is extremely narrow through city streets with almost no room for error","It has the most turns","It is the longest race"],answer:"The track is extremely narrow through city streets with almost no room for error",
   fact:"Monaco winds through the streets of Monte Carlo. Barriers are centimeters from the cars. Almost no room to overtake. Winning Monaco is considered one of motorsport's greatest achievements. Senna won it 6 times."},
  {id:"s4_f102",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"McLaren History",sub:"F1 Teams",xp:55,
   q:"McLaren — Lando Norris's team — was founded by which legendary driver and engineer?",
   opts:["Ayrton Senna","Niki Lauda","Bruce McLaren","Jack Brabham"],answer:"Bruce McLaren",
   fact:'Bruce McLaren was a New Zealand driver who founded the team in 1963. He died testing a car in 1970 at age 32. The team he built went on to win 8 Constructors Championships and produce legends like Senna, Prost, and now Norris.'}

function getLvl(){
  let i=0;for(let j=LEVELS.length-1;j>=0;j--){if(state.xp>=LEVELS[j].min){i=j;break;}}
  return{lvl:i+1,...LEVELS[i],nextMax:LEVELS[Math.min(i+1,LEVELS.length-1)].max};
}
function updateHeader(){
  const l=getLvl(),pct=Math.min(100,Math.round(((state.xp-l.min)/(l.nextMax-l.min))*100));

  document.getElementById('levelName').textContent=l.name;
  document.getElementById('xpDisplay').textContent=state.xp.toLocaleString()+' / '+l.nextMax.toLocaleString()+' XP';
  document.getElementById('xpFill').style.width=pct+'%';
  document.getElementById('streakCount').textContent=Object.values(state.calDays||{}).filter(d=>d.checked).length;
}

function toggleScav(idx){
  const todayKey=getTodayKey();
  if(!state.bonusDays)state.bonusDays={};
  if(!state.bonusDays[todayKey])state.bonusDays[todayKey]={quizAnswers:{},scavChecked:[],completed:false};
  const sc=state.bonusDays[todayKey].scavChecked;
  const pos=sc.indexOf(idx);
  if(pos===-1)sc.push(idx);else sc.splice(pos,1);
  saveState();renderContent();
}

function answerBonus(qIdx,choice){
  const lesson=getBonusForToday();
  const todayKey=getTodayKey();
  if(!state.bonusDays)state.bonusDays={};
  if(!state.bonusDays[todayKey])state.bonusDays[todayKey]={quizAnswers:{},scavChecked:[],completed:false};
  const td=state.bonusDays[todayKey];
  if(td.quizAnswers[qIdx]!==undefined)return;
  td.quizAnswers[qIdx]=choice;
  if(choice===lesson.quiz[qIdx].a){awardXP(30);}
  saveState();renderContent();
  setTimeout(()=>{
    const next=document.querySelector('.bonus-q-card:not([data-answered])');
    if(next)next.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function completeBonus(){
  const todayKey=getTodayKey();
  if(!state.bonusDays)state.bonusDays={};
  if(!state.bonusDays[todayKey])state.bonusDays[todayKey]={quizAnswers:{},scavChecked:[],completed:false};
  state.bonusDays[todayKey].completed=true;
  awardXP(50);
  saveState();renderContent();
  showToast('BONUS COMPLETE! +50 XP');
}

/* ── REWARD HELPERS ── */
function todayAssignmentsDone(){
  return getAssignments().every(a=>state.completed.includes(a.id))&&todayLearnValidated();
}
function todayBonusDone(){
  const td=(state.bonusDays||{})[getTodayKey()]||{};
  return !!td.completed;
}
function todayAlreadyEarned(){
  const ledger=state.rewardLedger||[];
  return ledger.some(e=>e.type==='earn'&&e.date===getTodayKey());
}

function renderReward(){
  const ledger=state.rewardLedger||[];
  const totalEarned=ledger.filter(e=>e.type==='earn').reduce((s,e)=>s+e.amt,0);
  const totalSpent=ledger.filter(e=>e.type==='spend').reduce((s,e)=>s+e.amt,0);
  const balance=totalEarned-totalSpent;
  const assignsDone=todayAssignmentsDone();
  const bonusDone=todayBonusDone();
  const alreadyEarned=todayAlreadyEarned();
  const moveValidToday=todayMoveValidated();
  const canEarn=assignsDone&&bonusDone&&moveValidToday&&!alreadyEarned;

  let html=`<div class="reward-hero">
    <div class="reward-balance">$${balance.toFixed(2)}</div>
    <div class="reward-balance-lbl">Available Balance</div>
    <div class="reward-goal">Earn $5 today by completing everything</div>
  </div>`;

  html+=`<div class="section-title">&#127919; Today's Goal</div>
  <div class="day-goal-card">
    <div class="day-goal-row">
      <div class="day-goal-dot" style="background:${assignsDone?'var(--green)':'var(--border)'}"></div>
      <div class="day-goal-label">Complete all assignments</div>
      <div class="day-goal-status" style="color:${assignsDone?'var(--green)':'var(--muted)'}">${assignsDone?'&#10003; Done':'Not yet'}</div>
    </div>
    <div class="day-goal-row">
      <div class="day-goal-dot" style="background:${moveValidToday?'var(--green)':'var(--border)'}"></div>
      <div class="day-goal-label">Complete and validate all moves</div>
      <div class="day-goal-status" style="color:${moveValidToday?'var(--green)':'var(--muted)'}">${moveValidToday?'&#10003; Done':'Not yet'}</div>
    </div>
    <div class="day-goal-row">
      <div class="day-goal-dot" style="background:${bonusDone?'var(--green)':'var(--border)'}"></div>
      <div class="day-goal-label">Complete the bonus lesson</div>
      <div class="day-goal-status" style="color:${bonusDone?'var(--green)':'var(--muted)'}">${bonusDone?'&#10003; Done':'Not yet'}</div>
    </div>
    ${alreadyEarned?`<div style="background:var(--green-light);border:1px solid var(--green);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;font-weight:700;color:#15803D;text-align:center">&#127881; $5 earned today! Great work!</div>`:''}
    <button class="earn-btn ${canEarn?'ready':'not-ready'}" onclick="${canEarn?'earnReward()':'void(0)'}">${alreadyEarned?'&#10003; Already Earned Today':canEarn?'&#9989; EARN $5 NOW':'Complete both tasks above first'}</button>
  </div>`;

  html+=`<div class="section-title">&#128184; Ledger</div>`;
  if(!ledger.length){html+=`<div class="ledger-empty">No transactions yet. Earn your first $5 today!</div>`;}
  else{
    [...ledger].reverse().forEach(e=>{
      if(e.type==='earn'){
        html+=`<div class="ledger-row-earn">&#43;$${e.amt.toFixed(2)} earned &nbsp;&bull;&nbsp; ${e.date} ${e.note?'&bull; '+eh(e.note):''}</div>`;
      } else {
        html+=`<div class="ledger-row-spend">&#8722;$${e.amt.toFixed(2)} spent &nbsp;&bull;&nbsp; ${e.date} ${e.note?'&bull; '+eh(e.note):''}</div>`;
      }
    });
  }

  html+=`<div class="spend-box">
    <div class="spend-title">&#128274; Parent: Log a Spend</div>
    <input id="spendCodeIn" type="password" placeholder="Parent code" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-b);font-size:13px;outline:none;margin-bottom:8px">

      <button class="spend-btn" onclick="logSpend()">&#8722; Spend</button>
    </div>
    <div id="spendErr" style="color:#B91C1C;font-size:11px;font-weight:700;display:none">Wrong code or missing info.</div>
  </div>`;

  return html;
}

function earnReward(){
  if(!todayAssignmentsDone()||!todayBonusDone()||todayAlreadyEarned())return;
  if(!state.rewardLedger)state.rewardLedger=[];
  state.rewardLedger.push({type:'earn',amt:5,date:getTodayKey(),note:'Daily goal complete'});
  saveState();renderContent();
  showToast('$5 EARNED! Great work!');
}

async function logSpend(){
  const code=document.getElementById('spendCodeIn')?.value?.trim();
  const desc=document.getElementById('spendDesc')?.value?.trim();
  const amt=parseFloat(document.getElementById('spendAmt')?.value||'0');
  const err=document.getElementById('spendErr');
  const codeOk=await verifyCode(code);
  if(!codeOk||!desc||isNaN(amt)||amt<=0){
    if(err)err.style.display='block';return;
  }
  if(!state.rewardLedger)state.rewardLedger=[];
  state.rewardLedger.push({type:'spend',amt,date:getTodayKey(),note:desc});
  saveState();renderContent();
  showToast('-$'+amt.toFixed(2)+' logged');
}

let scavPage='nature';  // 'nature' or 'plates'
let scavOpenCat=null;

function toggleScavItem(type,key){
  if(!state.scavFound)state.scavFound={nature:{},plates:{}};
  if(!state.scavFound[type])state.scavFound[type]={};
  state.scavFound[type][key]=!state.scavFound[type][key];
  saveState();renderContent();
}
function toggleScavCat(idx){
  scavOpenCat=scavOpenCat===idx?null:idx;
  renderContent();
}
function setScavPage(p){scavPage=p;scavOpenCat=null;renderContent();}

function renderScavenger(){
  if(!state.scavFound)state.scavFound={nature:{},plates:{}};
  const nf=state.scavFound.nature||{};
  const pf=state.scavFound.plates||{};

  // totals
  const totalNature=NATURE_CATEGORIES.reduce((s,c)=>s+c.items.length,0);
  const foundNature=Object.values(nf).filter(Boolean).length;
  const foundPlates=Object.values(pf).filter(Boolean).length;
  const totalPlates=LICENSE_PLATES.length;

  let html=`<div class="scav-page-hero">
    <div class="scav-page-title">${scavPage==='nature'?'&#127807; WEST MICHIGAN NATURE HUNT':'&#128663; LICENSE PLATE HUNT'}</div>
    <div class="scav-page-sub">${scavPage==='nature'?'Summer 2026 — All Season Tracker':'All 50 States + Bonuses'}</div>
    <div class="scav-progress-row">
      <div class="scav-progress-bg"><div class="scav-progress-fill" style="width:${Math.round(((scavPage==='nature'?foundNature:foundPlates)/(scavPage==='nature'?totalNature:totalPlates))*100)}%"></div></div>
      <div class="scav-progress-lbl">${scavPage==='nature'?foundNature:foundPlates} / ${scavPage==='nature'?totalNature:totalPlates}</div>
    </div>
  </div>`;

  html+=`<div class="scav-page-tabs">
    <div class="scav-page-tab${scavPage==='nature'?' active':''}" onclick="setScavPage('nature')">&#127807; Nature Hunt</div>
    <div class="scav-page-tab${scavPage==='plates'?' active':''}" onclick="setScavPage('plates')">&#128663; License Plates</div>
  </div>`;

  if(scavPage==='nature'){
    NATURE_CATEGORIES.forEach((cat,ci)=>{
      const foundInCat=cat.items.filter((_,ii)=>nf[ci+'_'+ii]).length;
      const isOpen=scavOpenCat===ci;
      html+=`<div class="scav-cat-card">
        <div class="scav-cat-header" onclick="toggleScavCat(${ci})">
          <div class="scav-cat-icon">${cat.icon}</div>
          <div class="scav-cat-name">${eh(cat.cat)}</div>
          <div class="scav-cat-count">${foundInCat}/${cat.items.length}</div>
          <div class="scav-cat-chev${isOpen?' open':''}">&#9660;</div>
        </div>
        <div class="scav-cat-body${isOpen?' open':''}">`;
      cat.items.forEach((item,ii)=>{
        const found=!!nf[ci+'_'+ii];
        html+=`<div class="scav-item-row" onclick="toggleScavItem('nature','${ci+'_'+ii}')">
          <div class="scav-item-check${found?' found':''}">${found?'&#10003;':''}</div>
          <div class="scav-item-text${found?' found-text':''}">${eh(item)}</div>
        </div>`;
      });
      html+=`</div></div>`;
    });
  } else {
    html+=`<div class="scav-cat-card"><div class="plate-grid">`;
    LICENSE_PLATES.forEach((plate,pi)=>{
      const found=!!pf['p'+pi];
      html+=`<div class="plate-item${found?' found-plate':''}" onclick="toggleScavItem('plates','p${pi}')">
        ${found?'<div class="plate-check">&#10003; FOUND</div>':''}
        <div class="plate-name">${eh(plate)}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  return html;
}


async function verifyCode(input){
  const enc=new TextEncoder().encode(input.trim());
  const buf=await crypto.subtle.digest('SHA-256',enc);
  const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  return hex==='2e1943902be93c87e9d31812ef887d1f91326e8e8e3779feb59c48c9ac32f58f';
}


/* ── PARENT SIGN-OFF ── */
function getTodayKeySignoff(){return new Date().toISOString().slice(0,10);}

async function signOffLearn(){
  const code=prompt('Parent code to validate assignments:');
  if(!code)return;
  if(await verifyCode(code)){
    const k=getTodayKeySignoff();
    if(!state.signoffs)state.signoffs={};
    state.signoffs[k]=state.signoffs[k]||{};
    state.signoffs[k].learn=true;
    saveState();renderContent();
    showToast('ASSIGNMENTS VALIDATED!');
  } else {
    alert('Wrong code. Try again.');
  }
}

async function signOffMove(){
  const code=prompt('Parent code to validate moves:');
  if(!code)return;
  if(await verifyCode(code)){
    const k=getTodayKeySignoff();
    if(!state.signoffs)state.signoffs={};
    state.signoffs[k]=state.signoffs[k]||{};
    state.signoffs[k].move=true;
    saveState();renderContent();
    showToast('MOVES VALIDATED!');
  } else {
    alert('Wrong code. Try again.');
  }
}

function todayLearnValidated(){const k=getTodayKeySignoff();return !!(state.signoffs&&state.signoffs[k]&&state.signoffs[k].learn);}
function todayMoveValidated(){const k=getTodayKeySignoff();return !!(state.signoffs&&state.signoffs[k]&&state.signoffs[k].move);}

loadState();updateHeader();renderContent();
updateBonusTabVisibility();
setInterval(updateBonusTabVisibility,60000);
</script>

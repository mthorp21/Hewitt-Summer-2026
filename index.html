  {id:"s8_b01",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Wedding at Cana",sub:"John 2",xp:60,
   q:"The Wedding at Cana was the first miracle Jesus performed. What did he turn water into?",
   opts:["Bread","Oil","Wine","Honey"],answer:"Wine",
   fact:"John 2 — Mary told Jesus the wine had run out. Jesus had servants fill six stone jars with water and it became wine. The master of the banquet said it was the best wine of the night. It was the first sign that revealed his glory."},
  {id:"s8_b02",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"Paul on the Road to Damascus",sub:"Acts 9",xp:65,
   q:"Saul was a fierce persecutor of Christians. What happened to him on the road to Damascus that changed everything?",
   opts:["He heard a voice from heaven and was blinded by a great light","He was attacked by Roman soldiers","He had a dream about Jesus","He read a scroll and was convinced"],answer:"He heard a voice from heaven and was blinded by a great light",
   fact:"Acts 9 — A light from heaven flashed and Saul fell to the ground. A voice said: Saul, Saul, why do you persecute me? He was blind for three days until Ananias came and healed him. Saul became Paul, the greatest missionary in history."},
  {id:"s8_b03",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Lord Provides",sub:"Genesis 22",xp:65,
   q:"God tested Abraham by asking him to sacrifice his son Isaac. What did God provide at the last moment?",
   opts:["An angel to stop him","A ram caught in a thicket","A sign from the sky","Isaac was unharmed without any substitute"],answer:"A ram caught in a thicket",
   fact:"Genesis 22:13 — An angel stopped Abraham and a ram was caught in a thicket nearby. God said: now I know you fear God because you have not withheld your only son. God himself will provide became a declaration of faith."},
  {id:"s8_mu01",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Michael Jackson",sub:"Pop Music",xp:60,
   q:"Michael Jackson is known as the King of Pop. What 1982 album became the best-selling album of all time?",
   opts:["Off the Wall","Bad","Dangerous","Thriller"],answer:"Thriller",
   fact:"Thriller sold over 70 million copies worldwide. It produced seven top-ten singles. The title track music video directed by John Landis is the most watched music video in history. Jackson changed how music videos were made forever."},
  {id:"s8_mu02",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Music and the Brain",sub:"Science of Music",xp:55,
   q:"Research shows that learning to play a musical instrument as a child develops which part of the brain most significantly?",
   opts:["The visual cortex","The corpus callosum connecting both hemispheres","The amygdala controlling emotion","The cerebellum controlling balance"],answer:"The corpus callosum connecting both hemispheres",
   fact:"Musicians show significantly larger and more active corpus callosi than non-musicians. Playing an instrument requires both hands doing different things while reading music with your eyes and listening with your ears simultaneously. It is one of the best brain workouts available."},
  {id:"s8_ar01",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Architectural Design",sub:"Design",xp:55,
   q:"The Sydney Opera House in Australia is one of the most iconic buildings ever designed. What does its roof famously resemble?",
   opts:["A wave","Sails on the ocean","A crown","A shell"],answer:"Sails on the ocean",
   fact:"Danish architect Jorn Utzon designed the interlocking shell shapes in 1957. It was so revolutionary that engineers said it could not be built. It took 14 years and cost 15 times the original budget. It opened in 1973 and is now a UNESCO World Heritage Site."},
  {id:"s8_ar02",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Street Photography",sub:"Photography",xp:50,
   q:"Henri Cartier-Bresson coined the concept of the decisive moment in photography. What does it mean?",
   opts:["The best time of day to take a photo","The perfect split second when all elements align in a photo","The moment when you decide to buy a camera","The final edit of a photograph"],answer:"The perfect split second when all elements align in a photo",
   fact:"Cartier-Bresson believed every scene had one perfect moment where composition, light, and action all came together. He used a small quiet Leica camera to capture candid life. His work defined street photography as an art form."},
  {id:"s8_po01",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Maya Angelou",sub:"American Poetry",xp:70,
   q:"Maya Angelou wrote I Know Why the Caged Bird Sings. This phrase became a metaphor for what?",
   opts:["The joy of music","The restrictions placed on Black Americans despite their inner freedom and voice","The literal experience of owning birds","The loneliness of city life"],answer:"The restrictions placed on Black Americans despite their inner freedom and voice",
   fact:"Angelou took the image from a poem by Paul Laurence Dunbar. The caged bird sings not from joy but from longing and protest. Angelou recited her poem On the Pulse of Morning at Bill Clinton inauguration in 1993 — only the second poet ever to read at a presidential inauguration."},
  {id:"s8_po02",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Rhyme and Meter",sub:"Poetry Craft",xp:60,
   q:"In poetry, what is a couplet?",
   opts:["A poem with exactly two stanzas","Two consecutive lines that rhyme","A poem written in pairs by two poets","Two syllables in one line"],answer:"Two consecutive lines that rhyme",
   fact:"Couplets are the most basic rhyme unit in poetry. Shakespeare ended most of his sonnets with a rhyming couplet as a final punchline. Heroic couplets — pairs of rhyming lines in iambic pentameter — were the dominant form of poetry in the 18th century."},
  {id:"s8_ba01",cat:"basketball",icon:"&#127936;",bg:"#FEE8D6",title:"The Assist",sub:"Basketball Stats",xp:55,
   q:"An assist is credited when a player passes the ball and the receiver immediately scores. Who holds the NBA career assists record?",
   opts:["Magic Johnson","John Stockton","LeBron James","Jason Kidd"],answer:"John Stockton",
   fact:"John Stockton finished with 15,806 career assists — almost 4,000 more than second place. He played his entire career with the Utah Jazz alongside Karl Malone. He also holds the career steals record. He was named to the Hall of Fame in 2009."},
  {id:"s8_ba02",cat:"basketball",icon:"&#127936;",bg:"#FEE8D6",title:"Tim Duncan",sub:"NBA Legends",xp:60,
   q:"Tim Duncan won five NBA championships with the San Antonio Spurs. What position did he famously play?",
   opts:["Point Guard","Shooting Guard","Small Forward","Power Forward and Center"],answer:"Power Forward and Center",
   fact:"Duncan was called the Big Fundamental because his game was based on perfect footwork, positioning, and the bank shot rather than athleticism. He won championships in three different decades and is considered the greatest power forward in NBA history."},
  {id:"s8_ho01",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"Face-offs",sub:"Hockey Rules",xp:50,
   q:"Hockey games begin with a face-off at center ice. In what situations is a face-off used during the game?",
   opts:["Only at the start of periods","After every whistle stoppage","Only after goals","Only at the start of overtime"],answer:"After every whistle stoppage",
   fact:"Face-offs happen after goals, penalties, icing, offside, the puck going out of play, and injuries. Teams have designated face-off specialists. Winning face-offs is important because it gives your team immediate possession — critical in the offensive zone."},
  {id:"s8_ho02",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"The Rocket",sub:"NHL Legends",xp:65,
   q:"Maurice Richard, known as The Rocket, was the first NHL player to score how many goals in a season?",
   opts:["40","50","60","75"],answer:"50",
   fact:"Maurice Richard scored 50 goals in 50 games in the 1944-45 season, a record that stood for 36 years. He scored 544 career goals. The NHL MVP award is named the Hart Trophy but the scoring leader award is named the Maurice Richard Trophy in his honor."},
  {id:"s8_f101",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Qualifying",sub:"F1 Weekend",xp:55,
   q:"F1 qualifying is divided into three sessions called Q1, Q2, and Q3. How many cars compete for pole position in Q3?",
   opts:["5","8","10","12"],answer:"10",
   fact:"Q1 eliminates the five slowest cars. Q2 eliminates five more. The remaining ten fight for pole in Q3. The fastest single lap time wins pole. Pole position is worth one championship point and often leads to victory because overtaking at modern F1 circuits is very difficult."},
  {id:"s8_f102",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Lando Norris Career",sub:"F1 History",xp:65,
   q:"Lando Norris made his F1 debut in 2019. By the end of 2024 he had won multiple races. In which country was he born?",
   opts:["Australia","Britain","Belgium","Netherlands"],answer:"Britain",
   fact:"Lando Norris was born in Bristol, England in 1999. He grew up racing karts from age 8 and came through the McLaren junior program. He is known for his humor on social media and his deep relationship with the McLaren team and fans."},
  {id:"s8_f103",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Red Bull Ring",sub:"F1 Venues",xp:55,

   fact:"The Red Bull Ring sits in the Styrian mountains at over 700 meters above sea level. It is one of the shortest circuits on the calendar at just 4.3 km with only 10 corners. The thin air and altitude affect engine cooling and aerodynamic performance."}

  {id:"s9_m02",cat:"math",icon:"&#10135;",bg:"#F0FDF4",title:"Elapsed Time",sub:"Math",xp:55,

  {id:"s9_h01",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"Ancient Greece",sub:"World History",xp:60,

  {id:"s9_h02",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"Martin Luther King Jr",sub:"American History",xp:65,
   q:"MLK Jr delivered his I Have a Dream speech in 1963. In what city was it delivered?",
   opts:["Atlanta","Chicago","Washington D.C.","New York"],answer:"Washington D.C.",

  {id:"s9_b01",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Vine and Branches",sub:"John 15",xp:65,
   q:"Jesus says I am the vine and you are the branches. What happens to branches that stay connected to the vine?",
   opts:["They grow independently","They bear much fruit","They become the vine","They wither"],answer:"They bear much fruit",
   fact:"John 15:5 — Apart from me you can do nothing. The image teaches that our fruitfulness comes from staying connected to Jesus through prayer, obedience, and community. A branch cut from the vine dries up immediately."},
  {id:"s9_b02",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"Nicodemus",sub:"John 3",xp:60,
   q:"Nicodemus came to Jesus at night and Jesus told him: no one can see the kingdom of God unless they are born again. What kind of man was Nicodemus?",
   opts:["A fisherman","A Roman soldier","A Jewish religious leader","A tax collector"],answer:"A Jewish religious leader",
   fact:"Nicodemus was a Pharisee and member of the Sanhedrin — the Jewish ruling council. He came at night, possibly afraid to be seen with Jesus. The born again concept Jesus introduced meant spiritual rebirth, not physical."},
  {id:"s9_b03",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Ten Plagues",sub:"Exodus 7-12",xp:60,
   q:"The ten plagues fell on Egypt when Pharaoh refused to free the Israelites. Which plague was the final and most devastating one?",
   opts:["Locusts","Darkness","Death of firstborn sons","Rivers of blood"],answer:"Death of firstborn sons",
   fact:"The tenth plague caused Pharaoh to finally release the Israelites. God instructed His people to put lamb blood on their doorposts so the angel of death would pass over their homes. This event is commemorated in the Jewish Passover feast, which Jesus celebrated at the Last Supper."},
  {id:"s9_mu01",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Opera",sub:"Classical Music",xp:55,
   q:"Opera combines classical music with drama and singing. In what country did opera originate around 1600?",
   opts:["Germany","Austria","Italy","France"],answer:"Italy",
   fact:"Opera began in Florence, Italy with composers like Monteverdi trying to recreate ancient Greek drama. Italy dominated opera for 300 years. Famous operas include La Traviata, Rigoletto, and Carmen. The Three Tenors brought opera to mass audiences in the 1990s."},
  {id:"s9_mu02",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Hip Hop Origins",sub:"Music History",xp:60,
   q:"Hip hop began in the South Bronx, New York in the 1970s. Which DJ is widely credited as one of its founders?",
   opts:["Dr. Dre","DJ Jazzy Jeff","DJ Kool Herc","Grandmaster Flash"],answer:"DJ Kool Herc",
   fact:"DJ Kool Herc invented the breakbeat technique by using two turntables and extending the drum break section of a record. His block parties in 1973 are considered the birthplace of hip hop. The culture grew into one of the most influential art movements in history."},
  {id:"s9_ar01",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Film as Art",sub:"Visual Art",xp:55,
   q:"Stanley Kubrick directed films considered among the greatest ever made. Which of these is one of his films?",
   opts:["Jurassic Park","2001: A Space Odyssey","Schindler List","Saving Private Ryan"],answer:"2001: A Space Odyssey",
   fact:"2001: A Space Odyssey (1968) is considered one of the greatest films ever made. Kubrick used practical effects, no dialogue for long stretches, and classical music to create something no one had seen. It influenced every sci-fi film made after it."},
  {id:"s9_ar02",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Calligraphy",sub:"Art Forms",xp:50,
   q:"Steve Jobs famously credited a calligraphy class he took in college with inspiring what about the original Mac?",
   opts:["Its screen resolution","Its mouse and trackpad","Its beautiful typefaces and fonts","Its color scheme"],answer:"Its beautiful typefaces and fonts",
   fact:"Jobs dropped out of Reed College but kept auditing a calligraphy class. Ten years later those fonts became the foundation of the Macintosh typography system. It is one of history most famous examples of art and technology converging unexpectedly."},
  {id:"s9_po01",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Sonnet 18",sub:"William Shakespeare",xp:70,
   q:"Shakespeare's Sonnet 18 begins: Shall I compare thee to a summer's day? What is the poem ultimately about?",
   opts:["The beauty of summer weather","How poetry preserves a person's memory and beauty forever","A farewell to a loved one","The sadness of aging"],answer:"How poetry preserves a person's memory and beauty forever",
   fact:"Shakespeare argues that summer fades but the poem will preserve the subject's beauty forever. So long as men can breathe or eyes can see, so long lives this, and this gives life to thee. It is a powerful argument for why art matters."},
  {id:"s9_po02",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"In Flanders Fields",sub:"WWI Poetry",xp:65,
   q:"In Flanders Fields was written during World War One about soldiers who died. What image does the poet use to represent the fallen?",
   opts:["White crosses","Red poppies","Broken rifles","Empty helmets"],answer:"Red poppies",
   fact:"John McCrae wrote the poem in 1915. The red poppies bloomed over the graves in the fields of Flanders, Belgium. The poem led to the red poppy becoming the symbol of remembrance for fallen soldiers, worn on November 11th across the Commonwealth."},
  {id:"s9_ba01",cat:"basketball",icon:"&#127936;",bg:"#FEE8D6",title:"Allen Iverson",sub:"NBA Legends",xp:60,
   q:"Allen Iverson was one of the most electrifying players ever despite being only 6 feet tall. What was his famous nickname?",
   opts:["The Answer","AI","The Philly Flash","The Crossover King"],answer:"The Answer",
   fact:"Iverson won the 1996-97 scoring title as a rookie and later won four total scoring titles. He popularized the crossover dribble at the highest level. His 2001 MVP season when he led the 76ers to the Finals was one of the greatest individual seasons in NBA history."},
  {id:"s9_ho01",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"Overtime in Playoffs",sub:"Hockey Rules",xp:55,
   q:"In the NHL playoffs, overtime periods continue until someone scores. What is this format called?",
   opts:["Golden goal overtime","Sudden death overtime","Champion overtime","First to score format"],answer:"Sudden death overtime",
   fact:"Playoff overtime is the most dramatic format in sports. The first goal ends the game regardless of when it scores. Some of the greatest moments in hockey have come in overtime goals after games lasting five or six periods."},
  {id:"s9_f101",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Ferrari",sub:"F1 Teams",xp:60,
   q:"Ferrari is the most successful and iconic team in F1 history. How many Constructors Championships have they won?",
   opts:["8","10","14","16"],answer:"16",
   fact:"Ferrari has won 16 Constructors titles, more than any other team. They have competed in every season of the World Championship since 1950. The Prancing Horse badge and red livery are recognized worldwide. Winning at Ferrari is considered the ultimate achievement in F1."},
  {id:"s9_f102",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Downforce",sub:"Technical F1",xp:55,
   q:"F1 cars generate enormous downforce through their wings and floor. What does downforce do for the car?",
   opts:["Makes it lighter","Pushes the car into the track for more grip in corners","Reduces drag on straights","Cools the engine"],answer:"Pushes the car into the track for more grip in corners",
   fact:"A modern F1 car generates enough downforce to drive upside down on a tunnel ceiling at high speed. More downforce means more grip in corners but also more drag slowing the car on straights. Every team seeks the perfect balance between the two."},
  {id:"s9_f103",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Carlos Sainz",sub:"F1 Drivers",xp:55,
   q:"Carlos Sainz Jr drives for Ferrari and is the son of a rally legend. Which country are they from?",

   fact:"Both Sainz Sr and Jr are Spanish. Carlos Jr won his first race at Silverstone in 2022 in extremely difficult conditions. He is known for his racecraft and consistency."},
  {id:"s9_f104",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Monza",sub:"F1 Venues",xp:50,

   fact:"Monza sits in a royal park north of Milan. Average race speeds approach 260 km/h. The passionate Italian fans called the Tifosi make Monza one of the most electric atmospheres in all of sports."}

  {id:"s10_h01",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"The Renaissance",sub:"World History",xp:60,

   opts:["Ancient Egypt","Ancient Rome and Greece","The Byzantine Empire","The Ottoman Empire"],answer:"Ancient Rome and Greece",
   fact:"Renaissance scholars rediscovered Greek and Roman texts preserved in monasteries. The printing press in 1440 spread ideas rapidly. Leonardo da Vinci, Michelangelo, and Raphael all worked during this period."},
  {id:"s10_h02",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"Harriet Tubman",sub:"American History",xp:65,
   q:"Harriet Tubman escaped slavery and returned south to free others using a secret network called what?",
   opts:["The Freedom Trail","The Underground Railroad","The Liberty Route","The Northern Path"],answer:"The Underground Railroad",
   fact:"Tubman made 13 missions and freed about 70 enslaved people. She said: I never ran my train off the track and I never lost a passenger. During the Civil War she served as a spy and soldier for the Union army."},
  {id:"s10_b01",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Triumphal Entry",sub:"Luke 19",xp:60,
   q:"Jesus rode into Jerusalem on what animal while the crowd laid palm branches and cloaks on the road?",
   opts:["A horse","A donkey","A camel","A white mule"],answer:"A donkey",
   fact:"Luke 19 — A humble donkey, not a warrior king on a horse. The crowd shouted Hosanna and Blessed is the king who comes in the name of the Lord. Jesus fulfilled a prophecy from Zechariah 9:9 written 500 years earlier. The event is celebrated on Palm Sunday."},
  {id:"s10_b02",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"Gideon",sub:"Judges 7",xp:65,
   q:"God told Gideon to reduce his army of 32,000 to 300 men before fighting a vast enemy. Why did God do this?",
   opts:["The others were not skilled fighters","So Israel could not boast that their own strength saved them","The enemy was not that large","300 men were easier to feed"],answer:"So Israel could not boast that their own strength saved them",
   fact:"Judges 7:2 — God reduced the army so the victory would clearly be from Him. Gideon defeated 135,000 Midianites with 300 men carrying trumpets and torches. It is a lesson about trusting God over earthly power."},
  {id:"s10_b03",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Church in Acts",sub:"Acts 2",xp:60,
   q:"After Pentecost the early church devoted themselves to four things. Which was NOT one of them?",
   opts:["The apostles teaching","Fellowship","Building a temple","Breaking of bread and prayer"],answer:"Building a temple",
   fact:"Acts 2:42 — They devoted themselves to the apostles teaching and to fellowship, to the breaking of bread and to prayer. The early church met in homes and public spaces, not temples. Their radical community and generosity drew thousands to faith."},
  {id:"s10_mu01",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"The Symphony",sub:"Classical Music",xp:55,
   q:"A symphony orchestra can have up to 100 musicians. Which instrument family usually leads the orchestra?",
   opts:["Brass","Woodwinds","Strings","Percussion"],answer:"Strings",
   fact:"Violins, violas, cellos, and basses make up about 60 percent of a symphony orchestra. The concertmaster is the first violinist. The strings carry the melody in most classical compositions."},
  {id:"s10_mu02",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"David Bowie",sub:"Rock History",xp:60,
   q:"David Bowie created one of rock most famous alter egos. What was the name of his glam rock character?",
   opts:["Major Tom","Ziggy Stardust","Aladdin Sane","The Thin White Duke"],answer:"Ziggy Stardust",
   fact:"Ziggy Stardust debuted on the album The Rise and Fall of Ziggy Stardust in 1972. Bowie was a master of reinvention, creating new personas throughout his career. He influenced fashion, performance art, and music simultaneously."},
  {id:"s10_ar01",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Abstract Art",sub:"Art Movements",xp:55,
   q:"Which Russian artist created some of the earliest purely abstract paintings around 1910?",
   opts:["Marc Chagall","Wassily Kandinsky","Kazimir Malevich","El Lissitzky"],answer:"Wassily Kandinsky",
   fact:"Kandinsky believed colors and shapes could express emotions without representing objects. He said painting should be like music — felt, not just seen. His 1910 painting Composition IV is considered one of the first true abstract artworks in history."},
  {id:"s10_ar02",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Comic Book Art",sub:"Visual Culture",xp:50,
   q:"Stan Lee co-created many Marvel superheroes. Which hero did he and Jack Kirby create in 1963?",
   opts:["Superman","Spider-Man","The X-Men","The Flash"],answer:"The X-Men",
   fact:"Stan Lee and Jack Kirby created the X-Men in 1963. Comic book art is a genuine art form that combines illustration, storytelling, typography, and color theory."},
  {id:"s10_po01",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Free Verse",sub:"Poetry Forms",xp:65,
   q:"Free verse poetry does not follow a strict rhyme or meter. Which American poet is most associated with pioneering free verse?",
   opts:["Emily Dickinson","Robert Frost","Walt Whitman","T.S. Eliot"],answer:"Walt Whitman",
   fact:"Whitman published Leaves of Grass in 1855 and broke every rule of Victorian poetry. His long, flowing lines celebrated democracy, the body, and American identity. He inspired generations of poets including Allen Ginsberg and Langston Hughes."},
  {id:"s10_po02",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Emily Dickinson",sub:"American Poetry",xp:70,
   q:"Emily Dickinson wrote nearly 1,800 poems but published almost none in her lifetime. She is associated with which poetic technique?",
   opts:["Epic similes","The dash used for pauses and emphasis","AABB rhyme schemes","Dramatic monologues"],answer:"The dash used for pauses and emphasis",
   fact:"Dickinson used dashes everywhere to create pauses, suggest ambiguity, and mimic breathing. She also used slant rhymes rather than perfect rhymes. Today she is considered one of the greatest American poets."},
  {id:"s10_ba01",cat:"basketball",icon:"&#127936;",bg:"#FEE8D6",title:"Three-Point Revolution",sub:"Modern NBA",xp:55,
   q:"The NBA three-point line was introduced in what year?",
   opts:["1972","1975","1979","1985"],answer:"1979",
   fact:"The ABA had used a three-point line since 1967 and the NBA adopted it in 1979. The Warriors and Steph Curry redefined the game by using it as their primary weapon from 2014 onward. It changed NBA strategy permanently."},
  {id:"s10_ho01",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"Penalty vs Soccer",sub:"Hockey vs Soccer",xp:50,
   q:"A hockey penalty shot differs from a soccer penalty kick because the hockey player must do what?",
   opts:["Shoot from outside the zone","Pass to a teammate first","Skate toward the goal before shooting","Jump over the crease"],answer:"Skate toward the goal before shooting",
   fact:"In hockey the shooter must be in continuous motion toward the net. In soccer the player kicks from a standing position. The hockey version is more dynamic because both the goalie and shooter are moving at speed."},
  {id:"s10_f101",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Pirelli",sub:"F1 Technical",xp:50,
   q:"Pirelli is the sole tyre supplier for Formula One. What country does Pirelli come from?",
   opts:["Germany","France","Japan","Italy"],answer:"Italy",
   fact:"Pirelli has been the exclusive F1 tyre supplier since 2011. The Italian company was founded in 1872 in Milan. Over 1,800 tyres are shipped to each Grand Prix."},
  {id:"s10_f102",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Grid Penalties",sub:"F1 Rules",xp:55,
   q:"In F1 a team receives grid penalties for taking additional engine components. What is a typical grid penalty?",
   opts:["5 places","10 places","15 places","20 places"],answer:"10 places",
   fact:"Engine component penalties are usually 10 grid places per new component beyond the yearly limit. Strategic penalties sometimes benefit a team if they take them on a circuit where overtaking is easy."},
  {id:"s10_f103",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Lap Record Monza",sub:"F1 History",xp:55,
   q:"The fastest average lap speed in F1 history was set at the 2019 Italian Grand Prix. Which driver set it?",
   opts:["Max Verstappen","Lewis Hamilton","Charles Leclerc","Valtteri Bottas"],answer:"Valtteri Bottas",
   fact:"Bottas set the outright F1 lap speed record of 264.362 km/h average at Monza 2019. Monza unique combination of long straights and minimal corners makes it permanently the fastest average-speed circuit."}
  ],

  [
  {id:"s11_m01",cat:"math",icon:"&#10135;",bg:"#F0FDF4",title:"Decimals and Division",sub:"Math",xp:55,
   q:"A hockey player scores 31 goals in 74 games. What is their goals per game average rounded to two decimal places?",
   opts:["0.39","0.42","0.44","0.51"],answer:"0.42",
   fact:"31 divided by 74 equals 0.4189, which rounds to 0.42 goals per game. A player scoring at 0.5 goals per game over a full season would score about 41 goals — an excellent total in the modern NHL."},
  {id:"s11_m02",cat:"math",icon:"&#10135;",bg:"#F0FDF4",title:"Angles",sub:"Math",xp:55,
   q:"A basketball court corner forms a right angle. How many degrees is a right angle?",
   opts:["45","60","90","180"],answer:"90",
   fact:"A right angle is exactly 90 degrees. A triangle has 180 degrees total. A circle has 360 degrees. Geometry shows up everywhere in sports — the optimal shooting angle in basketball, the entry angle of F1 corners, and the shooting angle in hockey."},
  {id:"s11_h01",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"Napoleon Bonaparte",sub:"World History",xp:65,
   q:"Napoleon Bonaparte rose from a Corsican military officer to become Emperor of France. In what year did he crown himself Emperor?",
   opts:["1799","1801","1804","1810"],answer:"1804",
   fact:"Napoleon crowned himself Emperor in Notre-Dame Cathedral in 1804. He reformed French law, education, and government. At his peak he controlled most of Europe."},
  {id:"s11_h02",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"Magna Carta",sub:"World History",xp:60,
   q:"The Magna Carta signed in 1215 established what idea for the first time?",
   opts:["Democracy through voting","The king is above the law","Even kings must obey the law and respect certain rights","Religious freedom for all people"],answer:"Even kings must obey the law and respect certain rights",
   fact:"King John of England was forced to sign it by rebellious barons. It established habeas corpus — the right to a fair trial. It influenced the US Constitution and Bill of Rights 500 years later."},
  {id:"s11_b01",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Beatitudes Part 2",sub:"Matthew 5",xp:65,
   q:"Jesus says: Blessed are the peacemakers, for they shall be called what?",
   opts:["Children of heaven","Friends of God","Children of God","Servants of the Most High"],answer:"Children of God",
   fact:"Matthew 5:9. Making peace is so deeply aligned with who God is that those who do it are identified as his children. In a world that rewards aggression, Jesus honors those who reconcile and bring unity."},
  {id:"s11_b02",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"Pentecost and the Spirit",sub:"Acts 2",xp:60,
   q:"Peter preached after the Holy Spirit came at Pentecost. How many people believed and were baptized that day?",
   opts:["120","500","3,000","10,000"],answer:"3,000",
   fact:"Acts 2:41 — About 3,000 people were added to the church in one day. Just weeks earlier Peter had denied knowing Jesus three times. The transformation is one of the most powerful examples of grace in the entire Bible."},
  {id:"s11_b03",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"Elijah in the Wilderness",sub:"1 Kings 19",xp:60,
   q:"After his great victory over the prophets of Baal, Elijah collapsed exhausted and afraid. What did God send to care for him?",
   opts:["A vision of heaven","An army of angels","An angel with bread and water","A cloud of protection"],answer:"An angel with bread and water",
   fact:"1 Kings 19:5-6 — An angel touched him and said: Arise and eat. God did not rebuke his exhaustion or fear. He provided food, water, and rest twice. Then he spoke to Elijah not in the earthquake or fire but in a gentle whisper."},
  {id:"s11_mu01",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Rhythm",sub:"Music Theory",xp:50,
   q:"A measure in 4/4 time has four beats. How many eighth notes fit in one measure of 4/4?",
   opts:["4","6","8","16"],answer:"8",
   fact:"An eighth note is half a quarter note so two fit in each beat. Four beats times two eighth notes equals eight. Most pop, rock, and hip hop music is written in 4/4 time."},
  {id:"s11_mu02",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Bruce Springsteen",sub:"American Music",xp:60,
   q:"Bruce Springsteen is known as The Boss and is associated with which state?",
   opts:["New York","Ohio","New Jersey","Pennsylvania"],answer:"New Jersey",
   fact:"Springsteen grew up in Freehold, New Jersey and his music is about working-class American life. Born to Run and Born in the USA are American anthems. He has performed concerts up to 4 hours long for 40 years."},
  {id:"s11_ar01",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Japanese Art",sub:"World Art",xp:55,
   q:"Hokusai created the most famous Japanese artwork showing a giant wave. What is it called?",
   opts:["The Great Tsunami","The Perfect Wave","The Great Wave off Kanagawa","The Wave of Fuji"],answer:"The Great Wave off Kanagawa",
   fact:"Created around 1831 as a woodblock print. It shows a towering wave with Mount Fuji in the background. It influenced Monet and Van Gogh. The image is one of the most recognizable artworks in history."},
  {id:"s11_ar02",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Mosaic Art",sub:"Ancient Art",xp:50,
   q:"Mosaic is an ancient art form. What material did early Roman mosaics primarily use?",
   opts:["Painted clay tiles","Stone, glass, and ceramics","Carved wood pieces","Pressed flowers"],answer:"Stone, glass, and ceramics",
   fact:"The Romans perfected mosaic with tesserae — small cut pieces of stone, glass, and ceramic. Many Roman mosaic floors and walls survive today. Byzantine churches used gold-backed glass tesserae to create luminous religious images."},
  {id:"s11_po01",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"The Road Not Taken",sub:"Robert Frost",xp:65,
   q:"In The Road Not Taken, what does Frost actually say about the two roads?",
   opts:["One is clearly better than the other","They are almost identical and the difference is small","One is longer and more dangerous","The narrator refuses to choose"],answer:"They are almost identical and the difference is small",
   fact:"Frost says the roads were really about the same. It is a poem about how we create meaning from ordinary choices and rationalize them later into bold decisions."},
  {id:"s11_po02",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Emily Dickinson Dash",sub:"American Poetry",xp:70,
   q:"Emily Dickinson's dashes create pauses. Which other poetic technique did she frequently use instead of perfect rhyme?",
   opts:["Alliteration","Onomatopoeia","Slant rhyme","Free verse"],answer:"Slant rhyme",
   fact:"Slant rhymes are near-rhymes where sounds are similar but not identical — hope and stop, or nature and feature. Dickinson used them constantly, giving her poems a slightly unsettled feeling that matched her themes of doubt, mortality, and awe."},
  {id:"s11_ba01",cat:"basketball",icon:"&#127936;",bg:"#FEE8D6",title:"Draymond Green",sub:"Modern NBA",xp:55,
   q:"Draymond Green was defensive anchor of the Warriors dynasty. How many titles did those Warriors win?",
   opts:["2","3","4","5"],answer:"4",
   fact:"The Warriors won championships in 2015, 2017, 2018, and 2022. Green was named Defensive Player of the Year in 2017 and is widely considered the blueprint for the modern versatile defensive big."},
  {id:"s11_ho01",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"Shot on Goal Definition",sub:"Hockey Basics",xp:50,
   q:"What is the official definition of a shot on goal in hockey?",
   opts:["Any shot that hits the post","Any puck directed at the net that goes in or is saved by the goalie","Any shot within the shooting range","Any attempt at the net from any position"],answer:"Any puck directed at the net that goes in or is saved by the goalie",
   fact:"Shots that miss the net or hit the post do not count. An elite NHL goaltender saves more than 92% of shots faced. Save percentage is one of the most important goaltending stats."},
  {id:"s11_f101",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Singapore Night Race",sub:"F1 Venues",xp:55,
   q:"The Singapore Grand Prix is a night race. What makes it physically the most demanding race of the year?",
   opts:["It has the most turns","It is the longest race by distance","The heat, humidity, and 61-corner layout make it the most draining","It has the most pit stops"],answer:"The heat, humidity, and 61-corner layout make it the most draining",
   fact:"Drivers lose several kilograms of body weight in sweat. The 61-corner circuit runs at night under floodlights. It regularly runs close to the 2-hour time limit. Drivers call it one of the hardest things in sport."},
  {id:"s11_f102",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Mercedes Dominance",sub:"F1 History",xp:60,
   q:"Mercedes won how many consecutive Constructors Championships from 2014 to 2021?",
   opts:["5","6","7","8"],answer:"8",
   fact:"Eight consecutive Constructors titles from 2014 through 2021. Lewis Hamilton won 7 of 8 driver titles. Red Bull then took over from 2022. The Mercedes dominance was built on a groundbreaking hybrid engine advantage."},
  {id:"s11_f103",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"The Podium Tradition",sub:"F1 Traditions",xp:50,
   q:"What happens at most F1 podiums after the national anthem?",
   opts:["Drivers sign autographs","Champagne is sprayed","Trophies are melted down","Car keys are exchanged"],answer:"Champagne is sprayed",
   fact:"The tradition began at the 1967 Le Mans when Dan Gurney spontaneously shook and sprayed a bottle. It became F1 tradition from 1966 onward. At some Middle Eastern races alcohol-free sparkling water is used instead."}

  {id:"s12_m01",cat:"math",icon:"&#10135;",bg:"#F0FDF4",title:"Probability",sub:"Math",xp:55,
   q:"You roll a standard six-sided die. What is the probability of rolling an even number?",
   opts:["1/6","1/3","1/2","2/3"],answer:"1/2",
   fact:"Even numbers on a die: 2, 4, 6. That is 3 out of 6 possible outcomes. 3/6 simplifies to 1/2. Probability shows up in sports analytics, card games, and science."},
  {id:"s12_m02",cat:"math",icon:"&#10135;",bg:"#F0FDF4",title:"Fuel Efficiency",sub:"F1 Math",xp:55,

   opts:["2.5","2.8","3.1","3.4"],answer:"2.8",
   fact:"305 divided by 110 equals 2.772, which rounds to 2.8 km per kg. F1 engineers calculate fuel loads to the gram. Running out of fuel costs a retirement."},
  {id:"s12_h01",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"The Printing Press",sub:"World History",xp:65,
   q:"Johannes Gutenberg invented the movable type printing press around 1440. What was the first major book printed on it?",
   opts:["The Odyssey","Shakespeare collected works","The Gutenberg Bible","The Communist Manifesto"],answer:"The Gutenberg Bible",
   fact:"Before the printing press, monks hand-copied books which took years per copy. The printing press enabled the rapid spread of ideas that fueled the Renaissance, Reformation, and Scientific Revolution."},
  {id:"s12_h02",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"Declaration of Independence",sub:"American History",xp:60,
   q:"The American Declaration of Independence was signed in what year?",
   opts:["1773","1776","1779","1783"],answer:"1776",
   fact:"July 4, 1776. Thomas Jefferson was its primary author. The famous phrase: We hold these truths to be self-evident, that all men are created equal. The Revolution ended with the Treaty of Paris in 1783."},
  {id:"s12_b01",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"Forgiveness",sub:"Matthew 18",xp:65,
   q:"Peter asked Jesus how many times to forgive someone who sins against him. Jesus answered with what?",
   opts:["Seven times is enough","Seventy-seven times or seventy times seven","As many times as you want","You must forgive three times then move on"],answer:"Seventy-seven times or seventy times seven",
   fact:"Matthew 18:22. The point is not a literal count but unlimited forgiveness. Those who have been forgiven much should extend that forgiveness to others. Forgiveness is one of the most radical ideas in Scripture."},
  {id:"s12_b02",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Lion and the Lamb",sub:"Revelation 5",xp:60,
   q:"Jesus is called the Lion of Judah in Revelation 5. But when John turns to see the Lion what does he actually see?",
   opts:["A great roaring lion on a throne","A lamb that had been slain standing at the center of the throne","A king wearing a crown","An angel holding a sword"],answer:"A lamb that had been slain standing at the center of the throne",
   fact:"Revelation 5:5-6 — The Lion turns out to be a Lamb. Power in God kingdom looks like sacrificial love, not domination. The one worthy to open the seals of history is the crucified and risen Jesus."},
  {id:"s12_b03",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Great Commission",sub:"Matthew 28",xp:60,
   q:"Jesus final words to his disciples in Matthew 28 — the Great Commission — commanded them to do what?",
   opts:["Build a great temple in Jerusalem","Wait in Jerusalem until he returned","Go and make disciples of all nations","Gather in one place and pray every day"],answer:"Go and make disciples of all nations",
   fact:"Matthew 28:19-20 — This is the mission that launched 2,000 years of the church spreading across every culture, language, and continent on earth."},
  {id:"s12_mu01",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Country Music",sub:"American Music",xp:55,
   q:"Country music is centered in which city?",
   opts:["Memphis","New Orleans","Nashville","Atlanta"],answer:"Nashville",
   fact:"Nashville, Tennessee. The Grand Ole Opry has broadcast live country music since 1927. Artists like Johnny Cash, Dolly Parton, Hank Williams, and Taylor Swift all have deep Nashville connections."},
  {id:"s12_mu02",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Voice Types",sub:"Music Education",xp:50,
   q:"Which is the highest female voice range?",
   opts:["Alto","Mezzo-soprano","Soprano","Contralto"],answer:"Soprano",
   fact:"Soprano is highest, then mezzo-soprano, then alto. Male equivalents: tenor, baritone, bass. Opera composers write for specific voice types. Whitney Houston and Mariah Carey are famous for their extraordinary soprano range."},
  {id:"s12_ar01",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Golden Gate Bridge",sub:"Architecture",xp:55,
   q:"The Golden Gate Bridge in San Francisco has what distinctive color?",
   opts:["Silver","Golden yellow","International Orange","Rust red"],answer:"International Orange",
   fact:"International Orange was chosen to make it visible in fog and complement the natural surroundings. When completed in 1937 it was the longest suspension bridge in the world."},
  {id:"s12_ar02",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Pointillism",sub:"Art Techniques",xp:55,
   q:"Pointillism uses tiny dots of pure color. Which French artist pioneered this technique?",
   opts:["Claude Monet","Paul Gauguin","Paul Signac","Georges Seurat"],answer:"Georges Seurat",
   fact:"Seurat created A Sunday on La Grande Jatte in 1886 using millions of tiny dots. It took him two years. The dots of pure color create optical mixing in the viewer eye rather than on the canvas."},
  {id:"s12_po01",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Lines and Stanzas",sub:"Poetry Structure",xp:60,
   q:"A stanza in poetry is equivalent to what in prose writing?",
   opts:["A sentence","A chapter","A paragraph","A page"],answer:"A paragraph",
   fact:"Just as a paragraph groups related sentences, a stanza groups related lines. A four-line stanza is a quatrain. A two-line stanza is a couplet. Stanza comes from the Italian word for room."},
  {id:"s12_po02",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"T.S. Eliot",sub:"Modern Poetry",xp:70,
   q:"T.S. Eliot wrote The Waste Land in 1922 to capture what feeling in post-war society?",
   opts:["Joy and renewal after victory","The sense of emptiness and disillusionment after World War One","The beauty of the English countryside","Pride in the British Empire"],answer:"The sense of emptiness and disillusionment after World War One",
   fact:"The Waste Land shattered the expectations of what poetry should be — it mixed languages, fragments, quotations, and voices without explanation. Eliot called it simply the relief of a personal grouse but critics called it the most important poem of the century."},
  {id:"s12_ba01",cat:"basketball",icon:"&#127936;",bg:"#FEE8D6",title:"Nikola Jokic",sub:"Modern NBA",xp:60,
   q:"Nikola Jokic won three MVP awards in four seasons. What country is he from?",
   opts:["Croatia","Slovenia","Serbia","Bosnia"],answer:"Serbia",
   fact:"Jokic was drafted 41st overall in 2014. He is a center with point guard vision. His back-to-back MVP seasons in 2022 and 2023 were among the greatest individual performances in modern NBA history."},
  {id:"s12_ho01",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"Goalie Pads History",sub:"Hockey Equipment",xp:50,
   q:"What were early hockey goalie shin pads made from?",
   opts:["Metal shin guards","Leather pads stuffed with horsehair and felt","Wooden boards strapped to legs","Thick wool wrappings"],answer:"Leather pads stuffed with horsehair and felt",
   fact:"Early goalies played in leather pads stuffed with horsehair. They were extremely heavy when wet. Modern foam and composite pads meet NHL size regulations designed to keep the game balanced."},
  {id:"s12_f101",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Spa-Francorchamps",sub:"F1 Venues",xp:60,
   q:"The Belgian Grand Prix is at Spa-Francorchamps. What is the name of its most famous corner combination?",
   opts:["Monza Curve","Eau Rouge and Raidillon","The Hairpin","Chapel Curve"],answer:"Eau Rouge and Raidillon",
   fact:"Eau Rouge goes downhill then immediately uphill at full speed — drivers take it flat out at over 300 km/h if conditions are right. F1 drivers regularly vote Spa their favorite circuit."},
  {id:"s12_f102",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Senna Helmet",sub:"F1 Legends",xp:55,
   q:"Ayrton Senna helmet design is iconic. What are its primary colors?",
   opts:["Red and white","Blue and yellow","Yellow, green, and blue inspired by the Brazilian flag","White with a yellow visor"],answer:"Yellow, green, and blue inspired by the Brazilian flag",
   fact:"Senna wore yellow with green and blue stripes representing the Brazilian flag throughout his career. After his death many Brazilian drivers adopted yellow helmets in tribute. Lando Norris has worn a Senna-tribute helmet design at several races."},
  {id:"s12_f103",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"Sprint Races",sub:"F1 Format",xp:50,
   q:"How long is an F1 Sprint race?",
   opts:["5 laps","15 minutes","100 km approximately","Half the full race distance"],answer:"100 km approximately",
   fact:"Sprint races are roughly 100 km compared to full races around 305 km. They award points from 1st through 8th place. Six Sprint weekends are held per season."}

  {id:"s13_h01",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"Genghis Khan",sub:"World History",xp:60,

  {id:"s13_h02",cat:"history",icon:"&#128214;",bg:"#FEF3C7",title:"American History 13",sub:"American History",xp:60,

  {id:"s13_b02",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"Peter Walks on Water",sub:"Matthew 14",xp:60,

  {id:"s13_b03",cat:"bible",icon:"&#9997;",bg:"#FFF7ED",title:"The Lost Sheep",sub:"Luke 15",xp:60,

  {id:"s13_mu01",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Music Theory 13",sub:"Music",xp:50,
   q:"What does the musical term forte mean?",
   opts:["Very slow","Very fast","Loud","Soft"],answer:"Loud",
   fact:"Forte (f) means loud. Piano (p) means soft. Fortissimo (ff) means very loud. Pianissimo (pp) means very soft. These Italian terms have been used in written music since the Baroque period. The instrument called piano was originally called pianoforte — soft-loud — because it could do both."},
  {id:"s13_mu02",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Music History 13",sub:"Genres",xp:55,
   q:"The blues is the musical foundation of rock, jazz, and hip hop. In which region of the United States did it originate?",
   opts:["New England","The Pacific Northwest","The Mississippi Delta South","The Great Plains"],answer:"The Mississippi Delta South",
   fact:"The blues emerged in the Mississippi Delta among Black sharecroppers in the late 1800s. Instruments included guitar, harmonica, and voice. Robert Johnson, Muddy Waters, and B.B. King are foundational figures. Without the blues there is no rock and roll, no jazz, and no hip hop."},
  {id:"s13_ar01",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Art History 13",sub:"World Art",xp:55,
   q:"What is the art form of creating images by combining different materials — paper, fabric, photos — onto a surface called?",
   opts:["Collage","Fresco","Etching","Lithography"],answer:"Collage",
   fact:"Collage comes from the French word coller meaning to glue. Picasso and Braque pioneered fine art collage during the Cubism movement around 1912. Today digital collage is one of the most common forms of visual communication. Every moodboard and Instagram layout is a form of collage."},
  {id:"s13_ar02",cat:"art",icon:"&#127912;",bg:"#ECFDF5",title:"Design Thinking 13",sub:"Design",xp:50,
   q:"In graphic design, what is the term for the space around or between elements in a composition?",
   opts:["Negative space","Dead space","Empty zone","Blank field"],answer:"Negative space",
   fact:"Negative space is as important as the objects themselves. The FedEx logo hides an arrow in the negative space between the E and x. The Nike swoosh uses negative space to suggest motion. Learning to see negative space is one of the most important lessons in art and design."},
  {id:"s13_po01",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Poetry Form 13",sub:"Poetry",xp:65,
   q:"An elegy is a type of poem written to mourn the death of someone. Which famous elegy was written by Walt Whitman mourning President Abraham Lincoln?",
   opts:["When Lilacs Last in the Dooryard Bloomed","O Captain My Captain only","Leaves of Grass","Song of Myself"],answer:"When Lilacs Last in the Dooryard Bloomed",
   fact:"Whitman wrote both O Captain My Captain and When Lilacs Last in the Dooryard Bloomed as elegies for Lincoln. The latter is considered his masterpiece — a complex meditation on death, grief, and the natural world. Whitman himself called the simpler O Captain poem his most successful in terms of public reception but his least personally meaningful."},
  {id:"s13_po02",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Poetic Devices 13",sub:"Poetry Craft",xp:60,
   q:"Alliteration is a poetic device where words in close proximity start with the same sound. Which of these is an example of alliteration?",
   opts:["The cat sat on the mat","Peter Piper picked a peck of pickled peppers","Once upon a time there was a girl","All that glitters is not gold"],answer:"Peter Piper picked a peck of pickled peppers",
   fact:"P-P-P-P-P. Every major word starts with the same sound. Alliteration creates rhythm and memorability. Poets, rappers, and speech writers all use it deliberately. I Have a Dream and We the People are both alliterative phrases that lodge themselves in memory."},
  {id:"s13_ba01",cat:"basketball",icon:"&#127936;",bg:"#FEE8D6",title:"Basketball Set 13",sub:"NBA",xp:55,
   q:"What does PER stand for in basketball analytics?",
   opts:["Points Earned Rating","Player Efficiency Rating","Performance and Energy Rating","Pass Efficiency Ratio"],answer:"Player Efficiency Rating",
   fact:"PER was created by John Hollinger and attempts to sum up a player total statistical contribution in one number. The league average is always 15. Michael Jordan career PER of 27.9 is the highest ever. Modern analytics have developed more sophisticated metrics but PER remains widely used."},
  {id:"s13_ho01",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"Hockey Set 13",sub:"NHL",xp:55,
   q:"In hockey, what is the Vezina Trophy awarded for?",
   opts:["Most career wins","Best defensive defenseman","Outstanding goaltender as voted by NHL general managers","Most shutouts in a season"],answer:"Outstanding goaltender as voted by NHL general managers",
   fact:"The Vezina Trophy is named after Georges Vezina who died of tuberculosis in 1926 and never missed a game in 15 NHL seasons. Winners include Patrick Roy, Dominik Hasek, and Henrik Lundqvist. It is the most prestigious individual award a goaltender can receive."},
  {id:"s13_f101",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"F1 Set 13A",sub:"F1 Knowledge",xp:55,
   q:"The steering wheel of an F1 car contains over 20 buttons and controls. What does the DRS button on the steering wheel activate?",
   opts:["The drag reduction system flap","The pit lane speed limiter","The radio communication","The engine power boost"],answer:"The drag reduction system flap",
   fact:"The DRS button opens the rear wing flap to reduce drag on straights when within one second of the car ahead. The F1 steering wheel also contains buttons for fuel mix, brake bias, differential settings, and radio. It costs around 50,000 dollars to manufacture."},
  {id:"s13_f102",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"F1 Set 13B",sub:"F1 Drivers",xp:60,
   q:"F1 driver Lando Norris signed his first F1 contract with McLaren at age 18. How old was he when he won his first F1 race?",
   opts:["22","23","24","25"],answer:"24",
   fact:"Lando Norris was born November 13, 1999, and won his first F1 race at the Miami Grand Prix on May 5, 2024, at age 24. He had been a podium finisher and front runner for years before finally converting his first win. The McLaren team erupted in celebration on the pit wall."},
  {id:"s13_f103",cat:"f1",icon:"&#127950;",bg:"#1a1a2e",title:"F1 Set 13C",sub:"F1 Technical",xp:50,
   q:"What is the minimum weight of an F1 car including driver according to recent regulations?",
   opts:["600 kg","720 kg","798 kg","850 kg"],answer:"798 kg",
   fact:"F1 cars must weigh at least 798 kg including the driver under the regulations that came in from 2022. Cars that are underweight receive time penalties. Teams ballast their cars to exactly the minimum weight to maximize performance. The cars are incredibly light for their size — a production road car weighs over 1,500 kg."}

  {id:"s16_mu01",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Music Theory 16",sub:"Music",xp:50,
   q:"What does the musical term forte mean?",
   opts:["Very slow","Very fast","Loud","Soft"],answer:"Loud",
   fact:"Forte (f) means loud. Piano (p) means soft. Fortissimo (ff) means very loud. Pianissimo (pp) means very soft. These Italian terms have been used in written music since the Baroque period. The instrument called piano was originally called pianoforte — soft-loud — because it could do both."},
  {id:"s16_mu02",cat:"music",icon:"&#127928;",bg:"#EDE9FE",title:"Music History 16",sub:"Genres",xp:55,
   q:"The blues is the musical foundation of rock, jazz, and hip hop. In which region of the United States did it originate?",
   opts:["New England","The Pacific Northwest","The Mississippi Delta South","The Great Plains"],answer:"The Mississippi Delta South",
   fact:"The blues emerged in the Mississippi Delta among Black sharecroppers in the late 1800s. Instruments included guitar, harmonica, and voice. Robert Johnson, Muddy Waters, and B.B. King are foundational figures. Without the blues there is no rock and roll, no jazz, and no hip hop."},

   q:"In graphic design, what is the term for the space around or between elements in a composition?",
   opts:["Negative space","Dead space","Empty zone","Blank field"],answer:"Negative space",

  {id:"s16_po01",cat:"poetry",icon:"&#128220;",bg:"#FEF9C3",title:"Poetry Form 16",sub:"Poetry",xp:65,
   q:"An elegy is a type of poem written to mourn the death of someone. Which famous elegy was written by Walt Whitman mourning President Abraham Lincoln?",

   fact:"Whitman wrote both O Captain My Captain and When Lilacs Last in the Dooryard Bloomed as elegies for Lincoln. The latter is considered his masterpiece — a complex meditation on death, grief, and the natural world. Whitman himself called the simpler O Captain poem his most successful in terms of public reception but his least personally meaningful."},

   opts:["When Lilacs Last in the Dooryard Bloomed","O Captain My Captain only","Leaves of Grass","Song of Myself"],answer:"When Lilacs Last in the Dooryard Bloomed",
   fact:"Whitman wrote both O Captain My Captain and When Lilacs Last in the Dooryard Bloomed as elegies for Lincoln. The latter is considered his masterpiece — a complex meditation on death, grief, and the natural world. Whitman himself called the simpler O Captain poem his most successful in terms of public reception but his least personally meaningful."},

   q:"Alliteration is a poetic device where words in close proximity start with the same sound. Which of these is an example of alliteration?",

   fact:"P-P-P-P-P. Every major word starts with the same sound. Alliteration creates rhythm and memorability. Poets, rappers, and speech writers all use it deliberately. I Have a Dream and We the People are both alliterative phrases that lodge themselves in memory."},
  {id:"s18_ba01",cat:"basketball",icon:"&#127936;",bg:"#FEE8D6",title:"Basketball Set 18",sub:"NBA",xp:55,
   q:"What does PER stand for in basketball analytics?",
   opts:["Points Earned Rating","Player Efficiency Rating","Performance and Energy Rating","Pass Efficiency Ratio"],answer:"Player Efficiency Rating",
   fact:"PER was created by John Hollinger and attempts to sum up a player total statistical contribution in one number. The league average is always 15. Michael Jordan career PER of 27.9 is the highest ever. Modern analytics have developed more sophisticated metrics but PER remains widely used."},
  {id:"s18_ho01",cat:"hockey",icon:"&#127944;",bg:"#E0F2FE",title:"Hockey Set 18",sub:"NHL",xp:55,
   q:"In hockey, what is the Vezina Trophy awarded for?",
   opts:["Most career wins","Best defensive defenseman","Outstanding goaltender as voted by NHL general managers","Most shutouts in a season"],answer:"Outstanding goaltender as voted by NHL general managers",
   fact:"The Vezina Trophy is named after Georges Vezina who died of tuberculosis in 1926 and never missed a game in 15 NHL seasons. Winners include Patrick Roy, Dominik Hasek, and Henrik Lundqvist. It is the most prestigious individual award a goaltender can receive."},

function loadState(){
  try{const s=JSON.parse(localStorage.getItem(SK));if(s)state=Object.assign({calDays:{},penalties:[]},state,s);if(!state.calDays)state.calDays={};if(!state.penalties)state.penalties=[];if(!state.bonusDays)state.bonusDays={};if(!state.rewardLedger)state.rewardLedger=[];if(!state.dailyTasks)state.dailyTasks={};if(!state.signoffs)state.signoffs={};if(!state.attempted)state.attempted={};}catch(e){}
}
function saveState(){localStorage.setItem(SK,JSON.stringify(state));}

function getLvl(){
  let i=0;for(let j=LEVELS.length-1;j>=0;j--){if(state.xp>=LEVELS[j].min){i=j;break;}}
  return{lvl:i+1,...LEVELS[i],nextMax:LEVELS[Math.min(i+1,LEVELS.length-1)].max};
}
function updateHeader(){
  const l=getLvl(),pct=Math.min(100,Math.round(((state.xp-l.min)/(l.nextMax-l.min))*100));
  document.getElementById('levelBadge').textContent='LVL '+l.lvl;
  document.getElementById('levelName').textContent=l.name;
  document.getElementById('xpDisplay').textContent=state.xp.toLocaleString()+' / '+l.nextMax.toLocaleString()+' XP';
  document.getElementById('xpFill').style.width=pct+'%';
  document.getElementById('streakCount').textContent=Object.values(state.calDays||{}).filter(d=>d.checked).length;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function awardXP(amt){
  const before=getLvl().lvl;state.xp+=amt;const after=getLvl().lvl;
  saveState();updateHeader();showToast('+'+amt+' XP!');
  if(after>before)setTimeout(()=>showToast('LEVEL UP! LVL '+after+' — '+getLvl().name.toUpperCase()),2400);
}

}

function dkey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function inRange(y,m,d){const dt=new Date(y,m,d);return dt>=CAL_START&&dt<=CAL_END;}
function getSpecials(y,m,d){
  const k=dkey(y,m,d);
  const results=[];
  if(k==='2026-07-04'){results.push(SPECIALS['2026-07-04']);results.push(...EXTRA_JULY4);return results;}
  if(SPECIALS[k])results.push(SPECIALS[k]);
  return results;
}

  </div>
  <div class="cal-header-bar">
    <button class="cal-nav-btn" onclick="calPrev()" ${!canPrev?'disabled':''}>&#9664;</button>
    <div class="cal-month-title">${MN[calM]} ${calY}</div>
    <button class="cal-nav-btn" onclick="calNext()" ${!canNext?'disabled':''}>&#9654;</button>
  </div>
  <div class="cal-legend">
    <div class="cal-li"><div class="cal-dot" style="background:#E8002D"></div>F1 Race</div>
    <div class="cal-li"><div class="cal-dot" style="background:#2244AA"></div>F1 Weekend</div>
    <div class="cal-li"><div class="cal-dot" style="background:var(--gold)"></div>Birthday</div>
    <div class="cal-li"><div class="cal-dot" style="background:var(--green)"></div>Logged &#10003;</div>
    <div class="cal-li"><div class="cal-dot" style="background:var(--blue-light);border:1px solid #93C5FD"></div>Event</div>
  </div>
  <div class="cal-grid">`;
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach((d,i)=>{
    html+=`<div class="cal-dow${i===0||i===5||i===6?' wknd':''}">${d}</div>`;
  });
  const firstDay=new Date(calY,calM,1).getDay();
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  for(let i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const k=dkey(calY,calM,d);
    const specials=getSpecials(calY,calM,d);
    const inR=inRange(calY,calM,d);
    const dd=state.calDays[k]||{};
    const dow=new Date(calY,calM,d).getDay();
    const isWknd=dow===0||dow===5||dow===6;
    const primary=specials.length?specials[0].type:null;
    let cls='cal-day';
    if(!inR)cls+=' out';
    else if(isWknd)cls+=' wknd-day';
    if(primary==='bday')cls+=' bday';
    else if(primary==='f1r')cls+=' f1r';
    else if(primary==='f1w')cls+=' f1w';
    if(dd.checked)cls+=' logged';
    html+=`<div class="${cls}"${inR?` onclick="openDay('${k}')"`:''}  data-k="${k}">`;
    html+=`<div class="cal-dn">${d}</div>`;
    if(primary==='bday'){
      html+='<div style="font-size:15px;line-height:1">&#127874;</div>';
      html+='<div class="cc cc-bday">BDAY!</div>';
    } else {
      html+='<div class="cal-events">';
      specials.forEach(sp=>{
        if(sp.type==='f1r')html+='<div class="cc cc-f1r">&#127937; F1</div>';
        else if(sp.type==='f1w')html+='<div class="cc cc-f1w">&#127950; F1</div>';
        else if(sp.type==='hol')html+=`<div class="cc cc-hol">${sp.label.substring(0,9)}</div>`;
        else if(sp.type==='summer')html+=`<div class="cc cc-sm">${sp.label.substring(0,9)}</div>`;
      });
      if(dd.note)html+='<div class="cc cc-note">&#128203; note</div>';
      if(dd.penalties&&dd.penalties.length)html+='<div class="cc" style="background:var(--red-light);color:#B91C1C;border:1px solid #FCA5A5">&#9888; penalty</div>';
      html+='</div>';
    }
    if(dd.checked)html+='<div class="cal-check-dot">&#10003;</div>';
    html+='</div>';
  }
  const rem=7-((firstDay+daysInMonth)%7);
  if(rem<7)for(let i=0;i<rem;i++)html+='<div class="cal-day empty"></div>';
  html+='</div>';
  return html;
}

function toggleCheck(k){

  saveState();
  const btn=document.getElementById('mcb');

async function addPenalty(k){
  const reason=document.getElementById('penReason')?.value?.trim();
  const pts=parseInt(document.getElementById('penAmt')?.value||'25');
  if(!reason){alert('Please enter a reason.');return;}
  if(!state.calDays[k])state.calDays[k]={};
  if(!state.calDays[k].penalties)state.calDays[k].penalties=[];
  state.calDays[k].penalties.push({reason,pts,time:new Date().toLocaleTimeString()});
  state.xp=Math.max(0,state.xp-pts);
  saveState();updateHeader();showToast('-'+pts+' XP');
  const box=document.getElementById('penHistoryBox');
  if(box)box.innerHTML=(state.calDays[k].penalties||[]).map(p=>`<div class="penalty-chip">&#9888; -${p.pts} XP: ${eh(p.reason)}</div>`).join('');
  renderContent();
}

function setFilter(f){activeFilter=f;openCard=null;renderContent();}
function toggleCard(id){openCard=openCard===id?null:id;renderContent();}

function answer(aid,choice){
  const a=getAssignments().find(x=>x.id===aid);
  if(!a||state.completed.includes(aid)||(state.attempted&&state.attempted[aid]))return;
  const optsEl=document.getElementById('opts_'+aid),resultEl=document.getElementById('result_'+aid);
  if(!optsEl||!resultEl)return;
  optsEl.querySelectorAll('.option-btn').forEach(btn=>{
    btn.disabled=true;
    if(btn.textContent.trim()===a.answer)btn.classList.add('correct');
    else if(btn.textContent.trim()===choice&&choice!==a.answer)btn.classList.add('wrong');
  });
  const att=state.attempted||{};
  const goNext=()=>{
    const filtered=activeFilter==='all'?getAssignments():getAssignments().filter(x=>x.cat===activeFilter);
    const next=filtered.find(x=>!state.completed.includes(x.id)&&!att[x.id]);
    if(next){
      openCard=next.id;renderContent();
      setTimeout(()=>{const el=document.getElementById('body_'+next.id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},120);
    } else {
      openCard=null;renderContent();showToast('ALL DONE! Great work Hewitt!');
    }
  };
  if(choice===a.answer){
    resultEl.innerHTML=`<div class="result-msg win">&#10003; ${eh(a.fact)}</div>`;
    state.completed.push(aid);saveState();
    setTimeout(()=>{awardXP(a.xp);goNext();},900);
  }else{
    if(!state.attempted)state.attempted={};
    state.attempted[aid]=choice;
    saveState();
    resultEl.innerHTML=`<div class="result-msg lose">&#10007; Not quite. The correct answer was: <strong>${eh(a.answer)}</strong>. ${eh(a.fact)}</div>`;
    setTimeout(()=>{goNext();},1400);
  }
}

function completeTask(tid){
  const todayKey=getTodayKeySignoff();
  if(!state.dailyTasks)state.dailyTasks={};
  if(!state.dailyTasks[todayKey])state.dailyTasks[todayKey]=[];
  if(state.dailyTasks[todayKey].includes(tid))return;
  const t=TASKS.find(x=>x.id===tid);if(!t)return;
  state.dailyTasks[todayKey].push(tid);
  // Also track lifetime for Athlete badge
  if(!state.tasksCompleted.includes(tid))state.tasksCompleted.push(tid);
  saveState();awardXP(t.xp);renderContent();
}

      let cls='bonus-opt';
      if(answered){if(opt===q.a)cls+=' correct';else if(opt===td.quizAnswers[i]&&opt!==q.a)cls+=' wrong';}
      html+=`<button class="${cls}"${answered?' disabled':''} onclick="answerBonus(${i},'${ea(opt)}')">${eh(opt)}</button>`;
    });
    html+=`</div></div>`;
  });
  if(allQuizDone&&quizCorrect){
    html+=`<button class="earn-btn ready" onclick="completeBonus()">&#9989; COMPLETE BONUS LESSON</button>`;
  } else if(allQuizDone&&!quizCorrect){
    html+=`<div style="background:var(--red-light);border:1px solid var(--red);border-radius:10px;padding:12px;text-align:center;font-size:13px;font-weight:600;color:#B91C1C;margin-top:8px">Some answers were wrong. Read the passage again and try tomorrow!</div>`;
  }
  return html;
}


function toggleScav(idx){
  const todayKey=getTodayKey();
  if(!state.bonusDays)state.bonusDays={};
  if(!state.bonusDays[todayKey])state.bonusDays[todayKey]={quizAnswers:{},scavChecked:[],completed:false};
  const sc=state.bonusDays[todayKey].scavChecked;
  const pos=sc.indexOf(idx);
  if(pos===-1)sc.push(idx);else sc.splice(pos,1);
  saveState();renderContent();
}

function answerBonus(qIdx,choice){
  const lesson=getBonusForToday();
  const todayKey=getTodayKey();
  if(!state.bonusDays)state.bonusDays={};
  if(!state.bonusDays[todayKey])state.bonusDays[todayKey]={quizAnswers:{},scavChecked:[],completed:false};
  const td=state.bonusDays[todayKey];
  if(td.quizAnswers[qIdx]!==undefined)return;
  td.quizAnswers[qIdx]=choice;
  if(choice===lesson.quiz[qIdx].a){awardXP(30);}
  saveState();renderContent();
  setTimeout(()=>{
    const next=document.querySelector('.bonus-q-card:not([data-answered])');
    if(next)next.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function completeBonus(){
  const todayKey=getTodayKey();
  if(!state.bonusDays)state.bonusDays={};
  if(!state.bonusDays[todayKey])state.bonusDays[todayKey]={quizAnswers:{},scavChecked:[],completed:false};
  state.bonusDays[todayKey].completed=true;
  awardXP(50);
  saveState();renderContent();
  showToast('BONUS COMPLETE! +50 XP');
}

/* ── REWARD HELPERS ── */
function todayAssignmentsDone(){
  const att=state.attempted||{};
  return getAssignments().every(a=>state.completed.includes(a.id)||att[a.id])&&todayLearnValidated();
}
function todayBonusDone(){
  const td=(state.bonusDays||{})[getTodayKey()]||{};
  return !!td.completed;
}
function todayAlreadyEarned(){
  const ledger=state.rewardLedger||[];
  return ledger.some(e=>e.type==='earn'&&e.date===getTodayKey());
}

function renderReward(){
  const ledger=state.rewardLedger||[];
  const totalEarned=ledger.filter(e=>e.type==='earn').reduce((s,e)=>s+e.amt,0);
  const totalSpent=ledger.filter(e=>e.type==='spend').reduce((s,e)=>s+e.amt,0);
  const balance=totalEarned-totalSpent;
  const assignsDone=todayAssignmentsDone();
  const bonusDone=todayBonusDone();
  const alreadyEarned=todayAlreadyEarned();
  const moveValidToday=todayMoveValidated();
  const canEarn=assignsDone&&bonusDone&&moveValidToday&&!alreadyEarned;

  let html=`<div class="reward-hero">
    <div class="reward-balance">$${balance.toFixed(2)}</div>
    <div class="reward-balance-lbl">Available Balance</div>
    <div class="reward-goal">Earn $5 today by completing everything</div>
  </div>`;

  html+=`<div class="section-title">&#127919; Today's Goal</div>
  <div class="day-goal-card">
    <div class="day-goal-row">
      <div class="day-goal-dot" style="background:${assignsDone?'var(--green)':'var(--border)'}"></div>
      <div class="day-goal-label">Complete all assignments</div>
      <div class="day-goal-status" style="color:${assignsDone?'var(--green)':'var(--muted)'}">${assignsDone?'&#10003; Done':'Not yet'}</div>
    </div>
    <div class="day-goal-row">
      <div class="day-goal-dot" style="background:${moveValidToday?'var(--green)':'var(--border)'}"></div>
      <div class="day-goal-label">Complete and validate all moves</div>
      <div class="day-goal-status" style="color:${moveValidToday?'var(--green)':'var(--muted)'}">${moveValidToday?'&#10003; Done':'Not yet'}</div>
    </div>
    <div class="day-goal-row">
      <div class="day-goal-dot" style="background:${bonusDone?'var(--green)':'var(--border)'}"></div>
      <div class="day-goal-label">Complete the bonus lesson</div>
      <div class="day-goal-status" style="color:${bonusDone?'var(--green)':'var(--muted)'}">${bonusDone?'&#10003; Done':'Not yet'}</div>
    </div>
    ${alreadyEarned?`<div style="background:var(--green-light);border:1px solid var(--green);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px;font-weight:700;color:#15803D;text-align:center">&#127881; $5 earned today! Great work!</div>`:''}
    <button class="earn-btn ${canEarn?'ready':'not-ready'}" onclick="${canEarn?'earnReward()':'void(0)'}">${alreadyEarned?'&#10003; Already Earned Today':canEarn?'&#9989; EARN $5 NOW':'Complete both tasks above first'}</button>
  </div>`;

  html+=`<div class="section-title">&#128184; Ledger</div>`;
  if(!ledger.length){html+=`<div class="ledger-empty">No transactions yet. Earn your first $5 today!</div>`;}
  else{
    [...ledger].reverse().forEach(e=>{
      if(e.type==='earn'){
        html+=`<div class="ledger-row-earn">&#43;$${e.amt.toFixed(2)} earned &nbsp;&bull;&nbsp; ${e.date} ${e.note?'&bull; '+eh(e.note):''}</div>`;
      } else {
        html+=`<div class="ledger-row-spend">&#8722;$${e.amt.toFixed(2)} spent &nbsp;&bull;&nbsp; ${e.date} ${e.note?'&bull; '+eh(e.note):''}</div>`;
      }
    });
  }

  html+=`<div class="spend-box">
    <div class="spend-title">&#128274; Parent: Log a Spend</div>
    <input id="spendCodeIn" type="password" placeholder="Parent code" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-b);font-size:13px;outline:none;margin-bottom:8px">
    <div class="spend-row">
      <input id="spendDesc" class="spend-input" placeholder="What was purchased">
      <input id="spendAmt" class="spend-amt" type="number" placeholder="$" min="0.01" step="0.01">
      <button class="spend-btn" onclick="logSpend()">&#8722; Spend</button>
    </div>
    <div id="spendErr" style="color:#B91C1C;font-size:11px;font-weight:700;display:none">Wrong code or missing info.</div>
  </div>`;

  return html;
}

function earnReward(){
  if(!todayAssignmentsDone()||!todayBonusDone()||todayAlreadyEarned())return;
  if(!state.rewardLedger)state.rewardLedger=[];
  state.rewardLedger.push({type:'earn',amt:5,date:getTodayKey(),note:'Daily goal complete'});
  saveState();renderContent();
  showToast('$5 EARNED! Great work!');
}

async function logSpend(){
  const code=document.getElementById('spendCodeIn')?.value?.trim();
  const desc=document.getElementById('spendDesc')?.value?.trim();
  const amt=parseFloat(document.getElementById('spendAmt')?.value||'0');
  const err=document.getElementById('spendErr');
  const codeOk=await verifyCode(code);
  if(!codeOk||!desc||isNaN(amt)||amt<=0){
    if(err)err.style.display='block';return;
  }
  if(!state.rewardLedger)state.rewardLedger=[];
  state.rewardLedger.push({type:'spend',amt,date:getTodayKey(),note:desc});
  saveState();renderContent();
  showToast('-$'+amt.toFixed(2)+' logged');
}


/* ── SCAVENGER HUNT STATE & RENDER ── */
let scavPage='nature';  // 'nature' or 'plates'
let scavOpenCat=null;

function toggleScavItem(type,key){
  if(!state.scavFound)state.scavFound={nature:{},plates:{}};
  if(!state.scavFound[type])state.scavFound[type]={};
  state.scavFound[type][key]=!state.scavFound[type][key];
  saveState();renderContent();
}
function toggleScavCat(idx){
  scavOpenCat=scavOpenCat===idx?null:idx;
  renderContent();
}
function setScavPage(p){scavPage=p;scavOpenCat=null;renderContent();}

function renderScavenger(){
  if(!state.scavFound)state.scavFound={nature:{},plates:{}};
  const nf=state.scavFound.nature||{};
  const pf=state.scavFound.plates||{};

  // totals
  const totalNature=NATURE_CATEGORIES.reduce((s,c)=>s+c.items.length,0);
  const foundNature=Object.values(nf).filter(Boolean).length;
  const foundPlates=Object.values(pf).filter(Boolean).length;
  const totalPlates=LICENSE_PLATES.length;

  let html=`<div class="scav-page-hero">
    <div class="scav-page-title">${scavPage==='nature'?'&#127807; WEST MICHIGAN NATURE HUNT':'&#128663; LICENSE PLATE HUNT'}</div>
    <div class="scav-page-sub">${scavPage==='nature'?'Summer 2026 — All Season Tracker':'All 50 States + Bonuses'}</div>
    <div class="scav-progress-row">
      <div class="scav-progress-bg"><div class="scav-progress-fill" style="width:${Math.round(((scavPage==='nature'?foundNature:foundPlates)/(scavPage==='nature'?totalNature:totalPlates))*100)}%"></div></div>
      <div class="scav-progress-lbl">${scavPage==='nature'?foundNature:foundPlates} / ${scavPage==='nature'?totalNature:totalPlates}</div>
    </div>
  </div>`;

  html+=`<div class="scav-page-tabs">
    <div class="scav-page-tab${scavPage==='nature'?' active':''}" onclick="setScavPage('nature')">&#127807; Nature Hunt</div>
    <div class="scav-page-tab${scavPage==='plates'?' active':''}" onclick="setScavPage('plates')">&#128663; License Plates</div>
  </div>`;

  if(scavPage==='nature'){
    NATURE_CATEGORIES.forEach((cat,ci)=>{
      const foundInCat=cat.items.filter((_,ii)=>nf[ci+'_'+ii]).length;
      const isOpen=scavOpenCat===ci;
      html+=`<div class="scav-cat-card">
        <div class="scav-cat-header" onclick="toggleScavCat(${ci})">
          <div class="scav-cat-icon">${cat.icon}</div>
          <div class="scav-cat-name">${eh(cat.cat)}</div>
          <div class="scav-cat-count">${foundInCat}/${cat.items.length}</div>
          <div class="scav-cat-chev${isOpen?' open':''}">&#9660;</div>
        </div>
        <div class="scav-cat-body${isOpen?' open':''}">`;
      cat.items.forEach((item,ii)=>{
        const found=!!nf[ci+'_'+ii];
        html+=`<div class="scav-item-row" onclick="toggleScavItem('nature','${ci+'_'+ii}')">
          <div class="scav-item-check${found?' found':''}">${found?'&#10003;':''}</div>
          <div class="scav-item-text${found?' found-text':''}">${eh(item)}</div>
        </div>`;
      });
      html+=`</div></div>`;
    });
  } else {
    html+=`<div class="scav-cat-card"><div class="plate-grid">`;
    LICENSE_PLATES.forEach((plate,pi)=>{
      const found=!!pf['p'+pi];
      html+=`<div class="plate-item${found?' found-plate':''}" onclick="toggleScavItem('plates','p${pi}')">
        ${found?'<div class="plate-check">&#10003; FOUND</div>':''}
        <div class="plate-name">${eh(plate)}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  return html;
}


async function verifyCode(input){
  const enc=new TextEncoder().encode(input.trim());
  const buf=await crypto.subtle.digest('SHA-256',enc);
  const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  return hex==='2e1943902be93c87e9d31812ef887d1f91326e8e8e3779feb59c48c9ac32f58f';
}


/* ── PARENT SIGN-OFF ── */
function getTodayKeySignoff(){return new Date().toISOString().slice(0,10);}

async function signOffLearn(){
  const code=prompt('Parent code to validate assignments:');
  if(!code)return;
  if(await verifyCode(code)){
    const k=getTodayKeySignoff();
    if(!state.signoffs)state.signoffs={};
    state.signoffs[k]=state.signoffs[k]||{};
    state.signoffs[k].learn=true;
    saveState();renderContent();
    showToast('ASSIGNMENTS VALIDATED!');
  } else {
    alert('Wrong code. Try again.');
  }
}

async function signOffMove(){
  const code=prompt('Parent code to validate moves:');
  if(!code)return;
  if(await verifyCode(code)){
    const k=getTodayKeySignoff();
    if(!state.signoffs)state.signoffs={};
    state.signoffs[k]=state.signoffs[k]||{};
    state.signoffs[k].move=true;
    saveState();renderContent();
    showToast('MOVES VALIDATED!');
  } else {
    alert('Wrong code. Try again.');
  }
}

function todayLearnValidated(){const k=getTodayKeySignoff();return !!(state.signoffs&&state.signoffs[k]&&state.signoffs[k].learn);}
function todayMoveValidated(){const k=getTodayKeySignoff();return !!(state.signoffs&&state.signoffs[k]&&state.signoffs[k].move);}

function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function ea(s){return String(s).replace(/'/g,'&#039;').replace(/"/g,'&quot;');}

loadState();updateHeader();renderContent();
updateBonusTabVisibility();
setInterval(updateBonusTabVisibility,60000);
</script>

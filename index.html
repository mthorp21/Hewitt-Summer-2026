<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hewitt's Summer Academy 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#F46D1B;--orange-dark:#C4540E;--orange-light:#FEE8D6;
  --navy:#0D1B2A;--gold:#F5C518;--gold-light:#FEF9C3;
  --green:#22C55E;--green-light:#DCFCE7;
  --red:#EF4444;--red-light:#FEE2E2;
  --blue:#3B82F6;--blue-light:#EFF6FF;
  --f1-red:#E8002D;--f1-dark:#15151E;--lando:#FF8000;--kimi:#00A0DE;
  --gray-bg:#F4F2EE;--card-bg:#FFFFFF;--text:#0D1B2A;--muted:#6B7280;
  --border:rgba(13,27,42,0.1);--radius:14px;
  --font-d:'Bebas Neue','Impact',sans-serif;--font-b:'DM Sans','Segoe UI',sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--gray-bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}
.app{max-width:680px;margin:0 auto;padding-bottom:80px;min-height:100vh;background:var(--gray-bg)}

/* HEADER */
.header{background:var(--navy);padding:24px 20px 0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(244,109,27,0.15) 0%,transparent 70%);pointer-events:none}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.app-title{font-family:var(--font-d);font-size:32px;color:var(--orange);letter-spacing:2px;line-height:.95}
.app-subtitle{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.streak-badge{background:var(--orange);color:white;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0}
.xp-section{padding:0 0 22px}
.level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.level-badge{background:var(--gold);color:var(--navy);font-family:var(--font-d);font-size:20px;padding:3px 12px;border-radius:6px;line-height:1.4;flex-shrink:0}
.level-name{color:white;font-size:15px;font-weight:600}
.xp-label{display:flex;justify-content:space-between;margin-bottom:7px}
.xp-label span{font-size:12px;color:rgba(255,255,255,.5)}
.xp-label strong{color:var(--gold);font-size:13px}
.xp-bar{background:rgba(255,255,255,.1);border-radius:99px;height:10px;overflow:hidden}
.xp-fill{background:linear-gradient(90deg,var(--orange),var(--gold));border-radius:99px;height:100%;transition:width .7s cubic-bezier(.4,0,.2,1);min-width:2px}

/* TABS */
.tabs{display:flex;background:white;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto}
.tab{flex:1;min-width:54px;padding:12px 3px 9px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.4px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;text-transform:uppercase;user-select:none;white-space:nowrap}
.tab:hover{color:var(--orange)}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-icon{font-size:17px;display:block;margin-bottom:2px}

.content{padding:18px 16px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:14px 10px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-num{font-family:var(--font-d);font-size:28px;color:var(--orange);line-height:1;letter-spacing:1px}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.section-title{font-family:var(--font-d);font-size:24px;color:var(--navy);margin-bottom:12px;letter-spacing:1px}

/* CHIPS */
.filter-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;background:white;color:var(--muted);transition:all .15s;text-transform:uppercase;letter-spacing:.3px;user-select:none}
.chip:hover{border-color:var(--orange);color:var(--orange)}
.chip.active{background:var(--navy);color:white;border-color:var(--navy)}

/* ASSIGNMENT CARDS */
.assignment-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.assignment-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.assignment-card.completed{opacity:.72}
.card-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;user-select:none}
.cat-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.card-meta{flex:1;min-width:0}
.card-title{font-weight:700;font-size:14px;line-height:1.3;margin-bottom:2px}
.card-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.card-xp{background:var(--orange-light);color:var(--orange-dark);font-size:12px;font-weight:800;padding:5px 12px;border-radius:99px;flex-shrink:0;white-space:nowrap}
.card-xp.done{background:var(--green-light);color:#15803D}
.chevron{font-size:13px;color:var(--muted);margin-left:2px;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.card-body{border-top:1px solid var(--border);padding:14px;display:none;animation:fadeIn .2s ease}
.card-body.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.card-question{font-size:14px;line-height:1.65;margin-bottom:14px;font-weight:500}
.card-options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.option-btn{background:var(--gray-bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;font-family:var(--font-b);cursor:pointer;text-align:left;transition:all .15s;font-weight:500;color:var(--text)}
.option-btn:hover:not(:disabled){border-color:var(--orange);background:var(--orange-light);color:var(--orange-dark)}
.option-btn.correct{background:var(--green-light);border-color:var(--green);color:#15803D;font-weight:700}
.option-btn.wrong{background:var(--red-light);border-color:var(--red);color:#B91C1C}
.option-btn:disabled{cursor:not-allowed}
.result-msg{font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:10px;font-weight:600;line-height:1.5}
.result-msg.win{background:var(--green-light);color:#15803D;border:1px solid var(--green)}
.result-msg.lose{background:var(--red-light);color:#B91C1C;border:1px solid var(--red)}
.done-stamp{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#15803D;background:var(--green-light);border:1px solid var(--green);border-radius:10px;padding:12px 14px;line-height:1.5}

/* TASK CARDS */
.task-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:opacity .2s}
.task-card.done-task{opacity:.6}
.task-icon{font-size:28px;flex-shrink:0}
.task-info{flex:1;min-width:0}
.task-name{font-weight:700;font-size:14px}
.task-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.task-xp-badge{font-size:11px;color:var(--orange-dark);font-weight:800;margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.task-check{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--orange);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0;font-family:var(--font-b)}
.task-check:hover{background:var(--orange-light)}
.task-check.done{background:var(--orange);border-color:var(--orange);color:white}

/* SPORTS */
.sports-card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:16px;box-shadow:var(--shadow)}
.sports-icon{font-size:32px;flex-shrink:0;margin-top:2px}
.sports-name{font-weight:700;font-size:15px;margin-bottom:2px}
.sports-stat{font-family:var(--font-d);font-size:30px;color:var(--orange);line-height:1.1;letter-spacing:1px}
.sports-lbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.sports-note{font-size:13px;color:var(--text);line-height:1.55}

/* PROFILE */
.profile-hero{background:var(--navy);border-radius:var(--radius);padding:28px 24px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;bottom:-30px;right:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(245,197,24,.12) 0%,transparent 70%);pointer-events:none}
.avatar{width:84px;height:84px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 14px;border:3px solid var(--gold);box-shadow:0 0 0 6px rgba(245,197,24,.15)}
.profile-name{font-family:var(--font-d);font-size:28px;color:white;letter-spacing:1px}
.profile-title{font-size:13px;color:var(--gold);margin-top:4px;font-weight:600}
.profile-stats{display:flex;justify-content:center;gap:16px;margin-top:16px;flex-wrap:wrap}
.profile-stat{color:rgba(255,255,255,.7);font-size:12px;text-align:center}
.profile-stat strong{display:block;font-family:var(--font-d);font-size:20px;color:white;letter-spacing:.5px;line-height:1.1}
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
.badge-item{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:12px 6px;text-align:center;box-shadow:var(--shadow);transition:transform .15s}
.badge-item:hover{transform:translateY(-2px)}
.badge-emoji{font-size:24px}
.badge-name{font-size:9px;color:var(--muted);margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-item.locked{opacity:.3;filter:grayscale(1)}
.badge-item.earned{border-color:var(--gold);background:var(--gold-light)}
.category-progress{display:flex;flex-direction:column;gap:10px}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-emoji{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.prog-label{font-size:11px;font-weight:700;min-width:75px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
.prog-bar-bg{flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden}
.prog-bar-fill{border-radius:99px;height:100%;background:var(--orange);transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-count{font-size:12px;color:var(--muted);min-width:28px;text-align:right;font-weight:700}
.reset-box{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-top:18px}
.reset-box h3{font-size:14px;font-weight:700;margin-bottom:6px}
.reset-box p{font-size:12px;color:var(--muted);margin-bottom:12px}
.reset-btn{background:var(--red-light);border:1px solid #FCA5A5;color:#B91C1C;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font-b);transition:background .15s}
.reset-btn:hover{background:#FEE2E2}

/* ====== CALENDAR ====== */
.cal-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month-title{font-family:var(--font-d);font-size:26px;color:var(--navy);letter-spacing:1px}
.cal-nav-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.cal-nav-btn:hover{background:var(--orange-light)}
.cal-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-dow{text-align:center;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:5px 0}
.cal-dow.wknd{color:var(--orange)}

.cal-day{background:var(--card-bg);border-radius:9px;border:1px solid var(--border);min-height:62px;padding:5px 4px 4px;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden}
.cal-day:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cal-day.out{background:rgba(255,255,255,.3);border:1px dashed rgba(13,27,42,.06);cursor:default}
.cal-day.out .cal-dn{color:rgba(13,27,42,.2)}
.cal-day.wknd-day{background:#FAFAF8}
.cal-day.logged{background:var(--green-light);border-color:var(--green)}
.cal-day.logged .cal-dn{color:#15803D}

.cal-day.bday{background:linear-gradient(135deg,#FFF7ED 0%,#FEF9C3 60%,#FFF7ED 100%);border:2px solid var(--gold);box-shadow:0 0 0 3px rgba(245,197,24,.2);animation:bdayPulse 2.5s ease-in-out infinite}
@keyframes bdayPulse{0%,100%{box-shadow:0 0 0 3px rgba(245,197,24,.2)}50%{box-shadow:0 0 0 6px rgba(245,197,24,.35)}}
.cal-day.bday .cal-dn{color:var(--orange);font-size:13px}

.cal-day.f1r{background:var(--f1-dark);border-color:var(--f1-red)}
.cal-day.f1r .cal-dn{color:var(--f1-red)}
.cal-day.f1r.logged{background:#1a0a0e;border-color:var(--f1-red)}
.cal-day.f1w{background:#1a1a2e;border-color:rgba(232,0,45,.35)}
.cal-day.f1w .cal-dn{color:rgba(255,255,255,.75)}

.cal-dn{font-size:11px;font-weight:800;line-height:1;margin-bottom:3px;color:var(--text)}
.cal-events{display:flex;flex-direction:column;gap:2px}
.cc{font-size:7px;font-weight:800;padding:1px 3px;border-radius:3px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
.cc-bday{background:var(--gold);color:#78350F}
.cc-f1r{background:var(--f1-red);color:white}
.cc-f1w{background:#2244AA;color:white}
.cc-hol{background:var(--red-light);color:#B91C1C;border:1px solid rgba(220,38,38,.2)}
.cc-sm{background:var(--blue-light);color:#1D4ED8;border:1px solid rgba(59,130,246,.2)}
.cal-check-dot{position:absolute;top:3px;right:3px;width:13px;height:13px;border-radius:50%;background:var(--green);color:white;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:800}

.cal-legend{display:flex;flex-wrap:wrap;gap:6px 12px;padding:8px 0 12px}
.cal-li{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--muted)}
.cal-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.cal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.cal-stat{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:11px 8px;text-align:center}
.cs-num{font-family:var(--font-d);font-size:24px;color:var(--orange);line-height:1}
.cs-lbl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}

/* DAY MODAL */
.overlay{position:fixed;inset:0;background:rgba(13,27,42,.5);z-index:500;display:flex;align-items:flex-end;animation:oIn .2s ease}
@keyframes oIn{from{opacity:0}to{opacity:1}}
.day-modal{background:var(--card-bg);width:100%;max-width:680px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px;max-height:82vh;overflow-y:auto;animation:sUp .25s cubic-bezier(.34,1.4,.64,1)}
@keyframes sUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.modal-title{font-family:var(--font-d);font-size:26px;color:var(--navy);letter-spacing:1px;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.modal-sl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;margin-top:12px}
.modal-note{width:100%;min-height:78px;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font-b);font-size:14px;color:var(--text);background:var(--gray-bg);resize:none;outline:none;transition:border-color .15s;line-height:1.5}
.modal-note:focus{border-color:var(--orange)}
.modal-cb{width:100%;padding:13px;border-radius:10px;border:none;font-family:var(--font-d);font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:12px}
.modal-cb.unc{background:var(--orange);color:white}
.modal-cb.chk{background:var(--green-light);color:#15803D;border:2px solid var(--green)}
.modal-cl{width:100%;padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;font-family:var(--font-b);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;color:var(--muted)}

.f1-box{background:var(--f1-dark);border-radius:10px;padding:13px 15px;margin-bottom:10px;border:1px solid rgba(232,0,45,.3)}
.f1-box-title{font-family:var(--font-d);font-size:20px;color:var(--f1-red);letter-spacing:1px;margin-bottom:3px}
.f1-box-detail{font-size:12px;color:rgba(255,255,255,.55);line-height:1.5}
.f1-drivers{display:flex;gap:8px;margin-top:9px}
.f1-dc{flex:1;border-radius:8px;padding:8px 10px}
.f1-dc .dnum{font-family:var(--font-d);font-size:22px;line-height:1}
.f1-dc .dname{font-size:11px;font-weight:700;margin-top:1px}

.bday-box{background:linear-gradient(135deg,#FFF7ED,#FEF9C3);border:2px solid var(--gold);border-radius:12px;padding:16px;margin-bottom:12px;text-align:center}
.bday-box-cake{font-size:40px;line-height:1;margin-bottom:8px}
.bday-box-title{font-family:var(--font-d);font-size:26px;color:var(--orange);letter-spacing:1px}
.bday-box-sub{font-size:13px;color:#92400E;margin-top:5px;line-height:1.5}

/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--navy);color:white;padding:13px 24px;border-radius:12px;font-weight:700;font-size:18px;font-family:var(--font-d);letter-spacing:1.5px;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap;border:2px solid var(--orange)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:480px){.stat-num{font-size:22px}.app-title{font-size:30px}.cal-day{min-height:52px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title">HEWITT'S<br>SUMMER ACADEMY</div>
        <div class="app-subtitle">Summer 2026 &nbsp;·&nbsp; Level Up</div>
      </div>
      <div class="streak-badge">&#128197; <span id="streakCount">0</span> days logged</div>
    </div>
    <div class="xp-section">
      <div class="level-row">
        <div class="level-badge" id="levelBadge">LVL 1</div>
        <div class="level-name" id="levelName">Rookie</div>
      </div>
      <div class="xp-label"><span>XP Progress</span><strong id="xpDisplay">0 / 500 XP</strong></div>
      <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="learn" onclick="switchTab('learn')"><span class="tab-icon">&#128218;</span>Learn</div>
    <div class="tab" data-tab="tasks" onclick="switchTab('tasks')"><span class="tab-icon">&#127939;</span>Move</div>
    <div class="tab" data-tab="sports" onclick="switchTab('sports')"><span class="tab-icon">&#127936;</span>Sports</div>
    <div class="tab" data-tab="calendar" onclick="switchTab('calendar')"><span class="tab-icon">&#128197;</span>Calendar</div>
    <div class="tab" data-tab="profile" onclick="switchTab('profile')"><span class="tab-icon">&#127942;</span>Profile</div>
  </div>

  <div class="content" id="mainContent"></div>

}

  document.getElementById('xpDisplay').textContent=state.xp.toLocaleString()+' / '+l.nextMax.toLocaleString()+' XP';
  document.getElementById('xpFill').style.width=pct+'%';
  document.getElementById('streakCount').textContent=Object.values(state.calDays||{}).filter(d=>d.checked).length;

// ===================== CALENDAR =====================
function dkey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function inRange(y,m,d){const dt=new Date(y,m,d);return dt>=CAL_START&&dt<=CAL_END;}
function getSpecials(y,m,d){
  const k=dkey(y,m,d);
  const results=[];
  if(k==='2026-07-04'){
    results.push(SPECIALS['2026-07-04']);
    results.push(...EXTRA_JULY4);
    return results;
  }
  if(SPECIALS[k])results.push(SPECIALS[k]);
  return results;
}

function renderCalendar(){
  const logged=Object.values(state.calDays).filter(d=>d.checked).length;
  const f1Races=Object.values(SPECIALS).filter(s=>s.type==='f1r').length;
  const canPrev=!(calM===5&&calY===2026),canNext=!(calM===7&&calY===2026);

  let html=`<div class="cal-stats">
    <div class="cal-stat"><div class="cs-num">${logged}</div><div class="cs-lbl">Days Logged</div></div>
    <div class="cal-stat"><div class="cs-num">86</div><div class="cs-lbl">Total Days</div></div>
    <div class="cal-stat"><div class="cs-num">${f1Races}</div><div class="cs-lbl">F1 Race Days</div></div>
  </div>`;

  html+=`<div class="cal-header-bar">
    <button class="cal-nav-btn" onclick="calPrev()" ${!canPrev?'disabled':''}>&#9664;</button>
    <div class="cal-month-title">${MN[calM]} ${calY}</div>
    <button class="cal-nav-btn" onclick="calNext()" ${!canNext?'disabled':''}>&#9654;</button>
  </div>`;

  html+=`<div class="cal-legend">
    <div class="cal-li"><div class="cal-dot" style="background:#E8002D"></div>F1 Race</div>
    <div class="cal-li"><div class="cal-dot" style="background:#2244AA"></div>F1 Weekend</div>
    <div class="cal-li"><div class="cal-dot" style="background:var(--gold)"></div>Birthday</div>
    <div class="cal-li"><div class="cal-dot" style="background:var(--green)"></div>Logged &#10003;</div>
    <div class="cal-li"><div class="cal-dot" style="background:var(--blue-light);border:1px solid #93C5FD"></div>Event</div>
  </div>`;

  html+='<div class="cal-grid">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach((d,i)=>{
    html+=`<div class="cal-dow${i===0||i===5||i===6?' wknd':''}">${d}</div>`;
  });

  const firstDay=new Date(calY,calM,1).getDay();
  const daysInMonth=new Date(calY,calM+1,0).getDate();

  for(let i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';

  for(let d=1;d<=daysInMonth;d++){
    const k=dkey(calY,calM,d);
    const specials=getSpecials(calY,calM,d);
    const inR=inRange(calY,calM,d);
    const dd=state.calDays[k]||{};
    const dow=new Date(calY,calM,d).getDay();
    const isWknd=dow===0||dow===5||dow===6;
    const primary=specials.length?specials[0].type:null;

    let cls='cal-day';
    if(!inR)cls+=' out';
    else if(isWknd)cls+=' wknd-day';
    if(primary==='bday')cls+=' bday';
    else if(primary==='f1r')cls+=' f1r';
    else if(primary==='f1w')cls+=' f1w';
    if(dd.checked)cls+=' logged';

    html+=`<div class="${cls}"${inR?` onclick="openDay('${k}')"`:''}  data-k="${k}">`;
    html+=`<div class="cal-dn">${d}</div>`;

    if(primary==='bday'){
      html+='<div style="font-size:15px;line-height:1">&#127874;</div>';
      html+='<div class="cc cc-bday">BDAY!</div>';
    } else {
      html+='<div class="cal-events">';
      specials.forEach(sp=>{
        if(sp.type==='f1r')html+='<div class="cc cc-f1r">&#127937; F1</div>';
        else if(sp.type==='f1w')html+='<div class="cc cc-f1w">&#127950; F1</div>';
        else if(sp.type==='hol')html+=`<div class="cc cc-hol">${sp.label.substring(0,9)}</div>`;
        else if(sp.type==='summer')html+=`<div class="cc cc-sm">${sp.label.substring(0,9)}</div>`;
      });
      if(dd.note)html+='<div class="cc cc-sm">&#128203; note</div>';
      if(dd.penalties&&dd.penalties.length)html+='<div class="cc" style="background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5">&#9888; -xp</div>';
      html+='</div>';
    }
    if(dd.checked)html+='<div class="cal-check-dot">&#10003;</div>';
    html+='</div>';
  }

  const rem=7-((firstDay+daysInMonth)%7);
  if(rem<7)for(let i=0;i<rem;i++)html+='<div class="cal-day empty"></div>';
  html+='</div>';
  return html;
}

function calPrev(){if(calM===5&&calY===2026)return;calM--;if(calM<0){calM=11;calY--;}renderContent();}
function calNext(){if(calM===7&&calY===2026)return;calM++;if(calM>11){calM=0;calY++;}renderContent();}

function openDay(k){
  const parts=k.split('-').map(Number);
  const [y,m,d]=[parts[0],parts[1],parts[2]];
  const specials=getSpecials(y,m-1,d);
  const dd=state.calDays[k]||{};
  const penHistory=dd.penalties&&dd.penalties.length?dd.penalties.map(p=>'<div style="font-size:12px;padding:6px 10px;background:#FEE2E2;border-radius:6px;margin-bottom:4px;color:#991B1B;font-weight:600">&#9888; -'+p.pts+' XP: '+eh(p.reason)+'</div>').join(''):'';
  const dateObj=new Date(y,m-1,d);
  const dayName=dateObj.toLocaleDateString('en-US',{weekday:'long'});
  const dateStr=dateObj.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  let html=`<div class="overlay" onclick="closeModal(event)"><div class="day-modal" id="dmi">
    <div class="modal-handle"></div>
    <div class="modal-title">${dayName}, ${MS[m-1]} ${d}</div>
    <div class="modal-sub">${dateStr}</div>`;

  if(specials.some(s=>s.type==='bday')){
    html+=`<div class="bday-box">
      <div class="bday-box-cake">&#127874;&#127881;&#127882;</div>
      <div class="bday-box-title">HAPPY 11TH BIRTHDAY HEWITT!</div>
      <div class="bday-box-sub">The British GP at Silverstone is TOMORROW. Best birthday ever?<br>Lando races on your birthday weekend. Let's go!</div>
    </div>`;
  }

  const f1sp=specials.find(s=>s.type==='f1r'||s.type==='f1w');
  if(f1sp){
    const isRace=f1sp.type==='f1r';
    html+=`<div class="f1-box">
      <div class="f1-box-title">${isRace?'&#127937;':'&#127950;'} ${eh(f1sp.race||'F1 Weekend')}</div>
      <div class="f1-box-detail">${eh(f1sp.circuit||'')} &nbsp;&bull;&nbsp; ${isRace?'RACE DAY':(f1sp.label.includes('Quali')?'QUALIFYING':'PRACTICE')}</div>
      <div class="f1-drivers">
        <div class="f1-dc" style="background:rgba(255,128,0,.15);border:1px solid rgba(255,128,0,.3)">
          <div class="dnum" style="color:#FF8000">4</div><div class="dname" style="color:white">Lando Norris</div>
        </div>
        <div class="f1-dc" style="background:rgba(0,160,222,.15);border:1px solid rgba(0,160,222,.3)">
          <div class="dnum" style="color:#00A0DE">12</div><div class="dname" style="color:white">Kimi Antonelli</div>
        </div>
      </div>
    </div>`;
  }

  if(specials.some(s=>s.type==='hol'&&s.label!=='4th of July')){
    const hol=specials.find(s=>s.type==='hol');
    html+=`<div style="background:var(--red-light);border:1px solid rgba(220,38,38,.2);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;font-weight:600;color:#B91C1C">&#127881; ${eh(hol.label)}</div>`;
  }

  html+=`<div class="modal-sl">Daily Note</div>
    <textarea class="modal-note" id="mnote" placeholder="What did you do today? How did it go? Write anything...">${eh(dd.note||'')}</textarea>
    <button class="modal-cb ${dd.checked?'chk':'unc'}" id="mcb" onclick="toggleCheck('${k}')">
      ${dd.checked?'&#10003; Day Logged!':'Mark Day Complete +10 XP'}
    </button>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
      <div style="font-size:10px;font-weight:800;color:#B91C1C;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">&#9888; Parent Penalty</div>
      ${penHistory}
      <input id="penReason" type="text" placeholder="Reason (e.g. disobeyed parents)" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-b);font-size:13px;margin-bottom:8px;outline:none;background:var(--gray-bg)">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <label style="font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap">XP to deduct:</label>
        <select id="penPts" style="flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-b);font-size:13px;background:var(--gray-bg);outline:none">
          <option value="25">25 XP</option>
          <option value="50">50 XP</option>
          <option value="75">75 XP</option>
          <option value="100">100 XP</option>
        </select>
        <button onclick="addPenalty('${k}')" style="background:#B91C1C;color:white;border:none;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--font-b);cursor:pointer;white-space:nowrap">Deduct XP</button>
      </div>
      <div id="penResult"></div>
    </div>
    <button class="modal-cl" onclick="saveNote('${k}');closeModal()">Save &amp; Close</button>
  </div></div>`;

  document.getElementById('modalContainer').innerHTML=html;
}

function saveNote(k){
  const ta=document.getElementById('mnote');
  if(ta){if(!state.calDays[k])state.calDays[k]={};state.calDays[k].note=ta.value;saveState();}
}
function addPenalty(k){
  const reason=document.getElementById('penReason').value.trim();
  const pts=parseInt(document.getElementById('penPts').value)||25;
  if(!reason){alert('Please enter a reason.');return;}
  const entry={date:k,reason:reason,pts:pts,ts:Date.now()};
  state.penalties.push(entry);
  // Log on calendar
  if(!state.calDays[k])state.calDays[k]={};
  if(!state.calDays[k].penalties)state.calDays[k].penalties=[];
  state.calDays[k].penalties.push(entry);
  state.xp=Math.max(0,state.xp-pts);
  saveState();updateHeader();
  showToast('-'+pts+' XP');
  document.getElementById('penReason').value='';
  document.getElementById('penResult').innerHTML='<div style="margin-top:8px;padding:10px 14px;background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;font-size:13px;font-weight:700;color:#B91C1C">&#9888; -'+pts+' XP logged: '+eh(reason)+'</div>';
  renderContent();
}

function toggleCheck(k){
  saveNote(k);
  if(!state.calDays[k])state.calDays[k]={};
  const was=state.calDays[k].checked;
  state.calDays[k].checked=!was;
  saveState();
  const btn=document.getElementById('mcb');
  if(btn){btn.className=`modal-cb ${state.calDays[k].checked?'chk':'unc'}`;btn.innerHTML=state.calDays[k].checked?'&#10003; Day Logged!':'Mark Day Complete +10 XP';}
  if(!was){awardXP(10);}
  renderContent();
}

function closeModal(e){
  if(e&&e.target!==document.querySelector('.overlay'))return;
  document.getElementById('modalContainer').innerHTML='';
  renderContent();
}

function renderProfile(){
  const l=getLvl();
  const logged=Object.values(state.calDays).filter(d=>d.checked).length;
  let html=`<div class="profile-hero">
    <div class="avatar">&#127936;</div>
    <div class="profile-name">HEWITT</div>
    <div class="profile-title">Level ${l.lvl} &mdash; ${l.name}</div>
    <div class="profile-stats">
      <div class="profile-stat"><strong>${state.xp.toLocaleString()}</strong>Total XP</div>
      <div class="profile-stat"><strong>${Object.values(state.calDays||{}).filter(d=>d.checked).length}</strong>Days Logged</div>
      <div class="profile-stat"><strong>${state.completed.length}</strong>Lessons</div>
      <div class="profile-stat"><strong>${logged}</strong>Days Logged</div>
    </div>
  </div>`;

  html+='<div class="section-title">&#127941; Badges</div><div class="badge-grid">';
  BADGES.forEach(b=>{
    const earned=b.check(state);
    html+=`<div class="badge-item${earned?' earned':' locked'}">
      <div class="badge-emoji">${b.icon}</div>
      <div class="badge-name">${eh(b.name)}</div>
    </div>`;
  });
  html+='</div>';

  html+='<div class="section-title" style="margin-top:20px">&#128202; Category Progress</div><div class="category-progress">';
  Object.keys(CE).forEach(cat=>{
    const total=getAssignments().filter(a=>a.cat===cat).length;
    if(!total)return;
    const done=state.completed.filter(id=>getAssignments().find(a=>a.id===id)?.cat===cat).length;
    const pct=Math.round((done/total)*100);
    html+=`<div class="prog-row">
      <div class="prog-emoji">${CE[cat]}</div>
      <div class="prog-label">${CL[cat]}</div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div class="prog-count">${done}/${total}</div>
    </div>`;
  });
  html+='</div>';

  // Penalty log
  if(state.penalties&&state.penalties.length){
    html+='<div class="section-title" style="margin-top:20px;color:#B91C1C">&#9888; Penalty Log</div>';
    html+='<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">';
    const sorted=[...state.penalties].sort((a,b)=>b.ts-a.ts);
    sorted.forEach(p=>{
      const dt=new Date(p.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      html+=`<div style="background:#FEE2E2;border:1px solid #FCA5A5;border-radius:10px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div>
          <div style="font-size:13px;font-weight:700;color:#991B1B">${eh(p.reason)}</div>
          <div style="font-size:11px;color:#B91C1C;margin-top:2px">${dt}</div>
        </div>
        <div style="font-family:var(--font-d);font-size:22px;color:#B91C1C;flex-shrink:0">-${p.pts} XP</div>
      </div>`;
    });
    html+='</div>';
  }

  html+=`<div class="reset-box">
    <h3>Reset Progress</h3>
    <p>Clears all XP, completed lessons, tasks, calendar logs, and penalty history.</p>
    <button class="reset-btn" onclick="resetAll()">Reset Everything</button>
  </div>`;
  return html;
}

function setFilter(f){activeFilter=f;openCard=null;renderContent();}
function toggleCard(id){openCard=openCard===id?null:id;renderContent();}

function answer(aid,choice){
  const a=getAssignments().find(x=>x.id===aid);
  if(!a||state.completed.includes(aid))return;
  const optsEl=document.getElementById('opts_'+aid),resultEl=document.getElementById('result_'+aid);
  if(!optsEl||!resultEl)return;
  optsEl.querySelectorAll('.option-btn').forEach(btn=>{
    btn.disabled=true;
    if(btn.textContent.trim()===a.answer)btn.classList.add('correct');
    else if(btn.textContent.trim()===choice&&choice!==a.answer)btn.classList.add('wrong');
  });
  if(choice===a.answer){
    resultEl.innerHTML=`<div class="result-msg win">&#10003; Correct! ${eh(a.fact)}</div>`;
    state.completed.push(aid);saveState();
    setTimeout(()=>{awardXP(a.xp);renderContent();},900);
  } else {
    resultEl.innerHTML=`<div class="result-msg lose">&#10007; Not quite. Answer: <strong>${eh(a.answer)}</strong>. ${eh(a.fact)}</div>`;
  }
}

function completeTask(tid){
  if(state.tasksCompleted.includes(tid))return;
  const t=TASKS.find(x=>x.id===tid);if(!t)return;
  state.tasksCompleted.push(tid);saveState();awardXP(t.xp);renderContent();
}

function advanceSet(){
  const input=document.getElementById('nextSetCode');
  const err=document.getElementById('nextSetErr');
  if(!input)return;
  if(input.value.trim()==='1823'){
    state.currentSet=(state.currentSet||0)+1;
    state.completed=[];
    openCard=null;
    activeFilter='all';
    saveState();renderContent();
    showToast('SET '+(state.currentSet+1)+' UNLOCKED!');
  } else {
    if(err)err.style.display='block';
    input.value='';input.focus();
  }
}

function resetAll(){
  if(!confirm('Reset all progress including XP, lessons, tasks, and calendar?'))return;
  state={xp:0,currentSet:0,completed:[],tasksCompleted:[],lastDate:null,calDays:{},penalties:[]};
  saveState();updateHeader();renderContent();
}

function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function ea(s){return String(s).replace(/'/g,'&#039;').replace(/"/g,'&quot;');}

loadState();updateHeader();renderContent();
</script>
</body>
</html>
